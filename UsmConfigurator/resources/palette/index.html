<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>USM Haller</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="title">USM Haller<span class="gear" id="gear" title="Engine settings">⚙</span></header>

    <!-- Settings (engine endpoint), hidden by default -->
    <section id="settings" class="settings hidden">
      <div class="label">usm-engine URL</div>
      <input id="engineUrl" type="text" placeholder="https://…up.railway.app" />
      <div class="label">Username (email)</div>
      <input id="engineUser" type="text" placeholder="email / username" autocomplete="off" />
      <div class="label">Password</div>
      <input id="enginePassword" type="password" placeholder="password" autocomplete="off" />
      <div class="actions">
        <button id="saveSettings" class="primary">Save</button>
        <button id="checkEngine">Test</button>
      </div>
    </section>

    <!-- Part catalogue -->
    <section>
      <div class="label">Part catalogue</div>
      <div class="actions">
        <button id="loadCatalog" class="primary">Load catalogue</button>
      </div>
      <input id="catFilter" class="catfilter hidden" type="text" placeholder="Filter parts…" />
      <div id="catalog" class="catalog"></div>
    </section>

    <section>
      <div class="label">Width module (mm)</div>
      <div class="chips" id="widths"></div>
    </section>

    <section>
      <div class="label">Height module (mm)</div>
      <div class="chips" id="heights"></div>
    </section>

    <section>
      <div class="label">Depth (mm)</div>
      <div class="chips" id="depths"></div>
    </section>

    <section class="steppers">
      <div class="stepper">
        <div class="label">Columns</div>
        <div class="step"><button data-step="cols" data-d="-1">–</button><span id="cols">2</span><button data-step="cols" data-d="1">+</button></div>
      </div>
      <div class="stepper">
        <div class="label">Rows</div>
        <div class="step"><button data-step="rows" data-d="-1">–</button><span id="rows">1</span><button data-step="rows" data-d="1">+</button></div>
      </div>
    </section>

    <section>
      <div class="label">Cell content</div>
      <div class="grid" id="cells"></div>
    </section>

    <section>
      <div class="label">Panel colour</div>
      <div class="swatches" id="colors"></div>
    </section>

    <footer>
      <div class="bom" id="bom">Set options, then Build.</div>
      <div class="actions">
        <button class="primary" id="build">Build</button>
        <button id="clear">Clear</button>
      </div>
      <div class="ver" id="ver"></div>
    </footer>
  </div>
  <script src="main.js"></script>
</body>
</html>
