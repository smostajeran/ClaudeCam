<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>USM Configurator</title>
<style>
  :root{--bg:#fff;--ink:#15171c;--mut:#6b7280;--line:#e6e8ec;--accent:#1565ff;--warn:#d98300;--sev:#d4334a}
  *{box-sizing:border-box}body{margin:0;font:13px/1.4 -apple-system,Segoe UI,Roboto,sans-serif;color:var(--ink);background:var(--bg)}
  .app{display:grid;grid-template-columns:280px 1fr 280px;height:100vh}
  .panel{border-right:1px solid var(--line);overflow:auto;padding:16px}
  .panel:last-child{border-right:0;border-left:1px solid var(--line)}
  h1{font-size:14px;margin:0 0 14px;font-weight:700;letter-spacing:.2px}
  h2{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--mut);margin:18px 0 8px;font-weight:600}
  .row{display:flex;align-items:center;gap:6px;margin:5px 0}
  select,button{font:inherit;border:1px solid var(--line);background:#fff;border-radius:6px;padding:5px 7px;color:var(--ink)}
  button{cursor:pointer}button:hover{border-color:var(--accent);color:var(--accent)}
  .x{border:0;color:var(--mut);padding:2px 6px}.x:hover{color:var(--sev)}
  .add{width:100%;border-style:dashed;color:var(--mut);margin-top:4px}
  .stage{position:relative;background:#fafbfc}canvas{display:block;width:100%;height:100%}
  .hint{position:absolute;left:12px;bottom:10px;color:var(--mut);font-size:11px}
  .cellgrid{display:grid;gap:4px;margin-top:4px}
  .bom{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--line)}
  .bom b{font-variant-numeric:tabular-nums;color:var(--mut);font-weight:500}
  .v{display:flex;gap:8px;padding:7px 9px;border-radius:6px;margin:4px 0;font-size:12px}
  .v.warning{background:#fff6e8;border-left:3px solid var(--warn)}.v.severe{background:#fdecef;border-left:3px solid var(--sev)}
  .ok{color:#1a8a52;font-size:12px}.swatch{width:14px;height:14px;border-radius:3px;border:1px solid var(--line);display:inline-block;vertical-align:-2px;margin-right:6px}
  .lbl{color:var(--mut);width:54px;display:inline-block}
</style></head>
<body><div class="app">
  <div class="panel" id="controls"><h1>USM Configurator</h1><div id="ctl"></div></div>
  <div class="stage"><canvas id="cv"></canvas><div class="hint">drag = orbit · wheel = zoom · server-derived geometry (/api/build)</div></div>
  <div class="panel"><h2>Bill of materials</h2><div id="bom"></div><h2>System check</h2><div id="val"></div></div>
</div>
<script>
const $=s=>document.querySelector(s);
let state={columnWidths:[750],rowHeights:[350],depth:350,cells:[],baseSupport:"feet"};
let PAYLOAD=null;
const METAL=[0.72,0.73,0.75]; // neutral render colour for steel — NOT a finish (no source-verified finish palette exists)
const cellMap=new Map(); // "c,r"->type

async function build(){
  // assemble cells array from the map, clamped to current grid
  state.cells=[];
  for(let c=0;c<state.columnWidths.length;c++)for(let r=0;r<state.rowHeights.length;r++){const t=cellMap.get(c+","+r);if(t&&t!=="closed")state.cells.push({col:c,row:r,type:t});}
  const res=await fetch('/api/build',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(state)});
  PAYLOAD=await res.json();
  renderControls();renderInfo();fit();draw();
}

// ---------- controls (from PAYLOAD.options) ----------
function renderControls(){
  const o=PAYLOAD.options.structure, c=$("#ctl");
  const widthSel=(val,on)=>`<select onchange="${on}">${o.columns.addWidths.map(w=>`<option ${w==val?'selected':''}>${w}</option>`).join('')}</select>`;
  let h="<h2>Columns (width mm)</h2>";
  state.columnWidths.forEach((w,i)=>{h+=`<div class="row">${widthSel(w,`setW(${i},this.value)`)}<button class="x" ${state.columnWidths.length>1?'':'disabled'} onclick="delW(${i})">✕</button></div>`;});
  h+=`<button class="add" onclick="addW()">+ column</button>`;
  h+="<h2>Rows (height mm)</h2>";
  state.rowHeights.forEach((r,i)=>{h+=`<div class="row">${`<select onchange="setH(${i},this.value)">${o.rows.addHeights.map(v=>`<option ${v==r?'selected':''}>${v}</option>`).join('')}</select>`}<button class="x" ${state.rowHeights.length>1?'':'disabled'} onclick="delH(${i})">✕</button></div>`;});
  h+=`<button class="add" onclick="addH()">+ row</button>`;
  h+=`<h2>Depth</h2><div class="row"><select onchange="set('depth',+this.value)">${o.depth.options.map(d=>`<option ${d==state.depth?'selected':''}>${d}</option>`).join('')}</select></div>`;
  h+=`<h2>Base</h2><div class="row"><select onchange="set('baseSupport',this.value)">${o.base.options.map(b=>`<option ${b==state.baseSupport?'selected':''}>${b}</option>`).join('')}</select></div>`;
  h+="<h2>Cells (content)</h2>";
  for(const cell of PAYLOAD.options.cells){h+=`<div class="row"><span class="lbl">${cell.width}×${cell.height}</span><select onchange="setCell(${cell.col},${cell.row},this.value)">${cell.available.map(a=>`<option value="${a.id}" ${a.id==cell.current?'selected':''}>${a.name}</option>`).join('')}</select></div>`;}
  c.innerHTML=h;
}
function set(k,v){state[k]=v;build();}
function setW(i,v){state.columnWidths[i]=+v;build();}
function setH(i,v){state.rowHeights[i]=+v;build();}
function addW(){state.columnWidths.push(750);build();}
function addH(){state.rowHeights.push(350);build();}
function delW(i){if(state.columnWidths.length>1){state.columnWidths.splice(i,1);build();}}
function delH(i){if(state.rowHeights.length>1){state.rowHeights.splice(i,1);build();}}
function setCell(c,r,t){cellMap.set(c+","+r,t);build();}

function renderInfo(){
  $("#bom").innerHTML=(PAYLOAD.bom||[]).map(b=>`<div class="bom"><span>${b.label}</span><b>×${b.qty}</b></div>`).join('')||'<div class="ok">—</div>';
  const items=(PAYLOAD.conflicts&&PAYLOAD.conflicts.items)||[];
  $("#val").innerHTML=items.length?items.map(i=>`<div class="v ${i.level}"><b>${i.level==='severe'?'⛔':'⚠️'}</b><span><b>${i.title}</b><br>${i.detail||''}</span></div>`).join(''):'<div class="ok">✓ No issues</div>';
}

// ---------- 3D (customer payload: metres, Y-up) ----------
const cv=$("#cv"),ctx=cv.getContext("2d");
let cam={yaw:-0.6,pitch:0.32,dist:4,cx:0,cy:0,cz:0,f:1};
function qrot(q,v){const[x,y,z,w]=q,[a,b,c]=v;const tx=2*(y*c-z*b),ty=2*(z*a-x*c),tz=2*(x*b-y*a);return[a+w*tx+(y*tz-z*ty),b+w*ty+(z*tx-x*tz),c+w*tz+(x*ty-y*tx)];}
function project(p){let x=p[0]-cam.cx,y=p[1]-cam.cy,z=p[2]-cam.cz;const cy=Math.cos(cam.yaw),sy=Math.sin(cam.yaw);let x1=x*cy-z*sy,z1=x*sy+z*cy;const cp=Math.cos(cam.pitch),sp=Math.sin(cam.pitch);let y2=y*cp-z1*sp,z2=y*sp+z1*cp;const d=z2+cam.dist;if(d<=0.05)return null;return{x:cv.width/2+x1*cam.f/d,y:cv.height/2-y2*cam.f/d,depth:d};}
function fit(){if(!PAYLOAD||!PAYLOAD.parts.length)return;const mn=[1e9,1e9,1e9],mx=[-1e9,-1e9,-1e9];for(const p of PAYLOAD.parts)for(let i=0;i<3;i++){mn[i]=Math.min(mn[i],p.pos[i]);mx[i]=Math.max(mx[i],p.pos[i]);}for(let i=0;i<3;i++)cam["cxyz"[i]==='c'?["cx","cy","cz"][i]:0]=(mn[i]+mx[i])/2;cam.cx=(mn[0]+mx[0])/2;cam.cy=(mn[1]+mx[1])/2;cam.cz=(mn[2]+mx[2])/2;const ext=Math.max(mx[0]-mn[0],mx[1]-mn[1],mx[2]-mn[2],0.5);cam.dist=ext*4;cam.f=Math.min(cv.width,cv.height)*0.62*cam.dist/ext;}
const rgb=(a,m=1)=>`rgb(${a.map(v=>Math.round(v*255*m)).join(',')})`;
function famColor(f){const m={connector:[.42,.45,.5],tube:METAL,panel:METAL,glass:[.31,.82,.88],door:[.95,.78,.4],drawer:[.95,.78,.4],support:[.3,.32,.36]};return m[f]||[.6,.62,.66];}
function draw(){if(!PAYLOAD)return;cv.width=cv.clientWidth;cv.height=cv.clientHeight;ctx.clearRect(0,0,cv.width,cv.height);const prims=[];
  for(const p of PAYLOAD.parts){const P=project(p.pos);if(!P)continue;
    if(p.quad){const C=p.quad.map(project);if(C.every(Boolean))prims.push({d:P.depth,t:'quad',C,f:p.family});}
    else if(p.family==='tube'){const m=(p.label.match(/(\d{2,4})/)||[])[1];const L=(m?+m:350)/2000;const e1=qrot(p.quat,[0,-L,0]),e2=qrot(p.quat,[0,L,0]);const A=project([p.pos[0]+e1[0],p.pos[1]+e1[1],p.pos[2]+e1[2]]),B=project([p.pos[0]+e2[0],p.pos[1]+e2[1],p.pos[2]+e2[2]]);if(A&&B)prims.push({d:(A.depth+B.depth)/2,t:'rod',A,B});}
    else prims.push({d:P.depth,t:'dot',P,f:p.family,r:p.family==='connector'?3.4:2.4});}
  prims.sort((a,b)=>b.d-a.d);
  for(const o of prims){
    if(o.t==='rod'){ctx.strokeStyle=rgb(METAL,.85);ctx.lineWidth=3;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(o.A.x,o.A.y);ctx.lineTo(o.B.x,o.B.y);ctx.stroke();}
    else if(o.t==='quad'){const g=o.f==='glass';ctx.fillStyle=g?'rgba(79,208,224,.18)':rgb(famColor(o.f),1)+'';ctx.globalAlpha=g?1:.55;ctx.strokeStyle=g?'rgba(79,208,224,.8)':rgb(famColor(o.f),.7);ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(o.C[0].x,o.C[0].y);for(let i=1;i<4;i++)ctx.lineTo(o.C[i].x,o.C[i].y);ctx.closePath();ctx.fill();ctx.stroke();ctx.globalAlpha=1;}
    else{ctx.fillStyle=rgb(famColor(o.f));ctx.beginPath();ctx.arc(o.P.x,o.P.y,o.r,0,7);ctx.fill();}
  }
}
let drag=null;
cv.addEventListener('mousedown',e=>drag={x:e.clientX,y:e.clientY});
addEventListener('mouseup',()=>drag=null);
addEventListener('mousemove',e=>{if(!drag)return;cam.yaw+=(e.clientX-drag.x)*.008;cam.pitch=Math.max(-1.5,Math.min(1.5,cam.pitch+(e.clientY-drag.y)*.008));drag={x:e.clientX,y:e.clientY};draw();});
cv.addEventListener('wheel',e=>{e.preventDefault();cam.dist*=e.deltaY>0?1.1:.9;draw();},{passive:false});
addEventListener('resize',()=>{fit();draw();});
build();
</script></body></html>
