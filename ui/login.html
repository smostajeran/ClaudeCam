<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>USM Engine — Sign in</title>
<style>
  :root { --bg:#0f1115; --panel:#171a21; --line:#2a2f3a; --ink:#e7ebf2; --dim:#8a93a6; --acc:#5b9dff; --ok:#7ee0a0; --bad:#ff7a85; --mono:ui-monospace,Consolas,monospace; }
  * { box-sizing:border-box; }
  body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--bg); color:var(--ink); font:14px/1.5 system-ui,Segoe UI,sans-serif; }
  .card { width:min(420px,92vw); background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:26px; }
  h1 { font-size:17px; margin:0 0 2px; } .sub { color:var(--dim); font-size:12px; margin-bottom:18px; }
  label { display:block; font-size:11px; text-transform:uppercase; letter-spacing:.5px; color:var(--dim); margin:12px 0 5px; }
  input { width:100%; padding:9px 11px; background:var(--bg); border:1px solid var(--line); border-radius:8px; color:var(--ink); font:inherit; }
  .row { display:flex; gap:8px; margin-top:16px; }
  button { flex:1; padding:9px 12px; border-radius:8px; border:1px solid var(--line); background:var(--panel); color:var(--ink); font:inherit; cursor:pointer; }
  button.primary { background:var(--acc); color:#06101f; border-color:var(--acc); font-weight:600; }
  button:hover { border-color:var(--acc); }
  .msg { margin-top:14px; font-size:13px; min-height:18px; } .msg.ok { color:var(--ok); } .msg.bad { color:var(--bad); }
  .signed { display:none; }
  .tok { font:11px/1.4 var(--mono); color:var(--dim); word-break:break-all; background:var(--bg); border:1px solid var(--line); border-radius:8px; padding:8px; margin-top:10px; max-height:90px; overflow:auto; }
  .test { border-top:1px solid var(--line); margin-top:18px; padding-top:14px; }
  a { color:var(--acc); }
</style>
</head>
<body>
<div class="card">
  <h1>USM Engine</h1>
  <div class="sub" id="target">…</div>

  <div id="form">
    <label>Email</label><input id="email" type="email" autocomplete="username" />
    <label>Password</label><input id="pw" type="password" autocomplete="current-password" />
    <div class="row">
      <button class="primary" id="signin">Sign in</button>
    </div>
    <div class="sub" style="margin:12px 0 0">Accounts are provisioned by your administrator.</div>
  </div>

  <div class="signed" id="signed">
    <div class="msg ok" id="who"></div>
    <div class="tok" id="tok"></div>
    <div class="row"><button id="copy">Copy token</button><button id="signout">Sign out</button></div>
    <div class="test">
      <label>Test the locked door — solve a .pxpz with your token</label>
      <input id="file" type="file" accept=".pxpz" />
      <div class="msg" id="result"></div>
    </div>
  </div>

  <div class="msg" id="msg"></div>
</div>

<script>
const $ = (s) => document.querySelector(s);
let CFG = null, token = localStorage.getItem("usm_jwt") || null;

async function init(){
  CFG = await (await fetch("/api/config")).json();
  $("#target").innerHTML = `sign in to <b>${CFG.supabaseUrl.replace("https://","")}</b> · engine auth: ${CFG.authEnforced?"<span style='color:#7ee0a0'>enforced</span>":"open (local)"}`;
  if(token) showSigned();
}
function authHeaders(){ return { apikey: CFG.supabaseAnonKey, "Content-Type":"application/json" }; }

async function signin(){
  msg(""); const email=$("#email").value.trim(), password=$("#pw").value;
  if(!email||!password) return msg("enter email + password","bad");
  try{
    const r = await fetch(`${CFG.supabaseUrl}/auth/v1/token?grant_type=password`, { method:"POST", headers:authHeaders(), body:JSON.stringify({email,password}) });
    const j = await r.json();
    if(!r.ok || !j.access_token) return msg(j.error_description||j.msg||j.error||"sign-in failed","bad");
    token = j.access_token; localStorage.setItem("usm_jwt", token); showSigned(j);
  }catch(e){ msg(String(e),"bad"); }
}
function showSigned(j){
  $("#form").style.display="none"; $("#signed").style.display="block"; msg("");
  let email=""; try{ email = JSON.parse(atob(token.split(".")[1])).email || ""; }catch{}
  $("#who").textContent = "Signed in" + (email?` as ${email}`:"");
  $("#tok").textContent = token;
}
function signout(){ token=null; localStorage.removeItem("usm_jwt"); $("#signed").style.display="none"; $("#form").style.display="block"; msg("signed out","ok"); }
function msg(t,c){ const m=$("#msg"); m.textContent=t; m.className="msg "+(c||""); }

$("#signin").onclick=signin; $("#signout").onclick=signout;
$("#pw").addEventListener("keydown",(e)=>{ if(e.key==="Enter") signin(); });
$("#copy").onclick=()=>{ navigator.clipboard?.writeText(token); msg("token copied","ok"); };
$("#file").onchange=async(e)=>{
  const f=e.target.files[0]; if(!f) return;
  $("#result").textContent="solving…"; $("#result").className="msg";
  try{
    const r = await fetch("/api/solve-pxpz", { method:"POST", headers:{ Authorization:`Bearer ${token}` }, body: await f.arrayBuffer() });
    const j = await r.json();
    if(r.status===401){ $("#result").textContent="401 — token rejected (locked door working)"; $("#result").className="msg bad"; }
    else if(j.parts){ $("#result").textContent=`✓ ${j.parts.length} parts placed (${j.catalog.length} distinct) — locked door passed`; $("#result").className="msg ok"; }
    else { $("#result").textContent=JSON.stringify(j).slice(0,140); $("#result").className="msg bad"; }
  }catch(err){ $("#result").textContent=String(err); $("#result").className="msg bad"; }
};
init();
</script>
</body>
</html>
