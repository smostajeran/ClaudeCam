<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Wireframe Configurator</title>
<style>
  :root{--bg:#0b0d12;--panel:#10131a;--ink:#e7ebf3;--mut:#8893a6;--line:#23262e;--accent:#5aa7ff}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font:13px/1.4 -apple-system,Segoe UI,Roboto,sans-serif;color:var(--ink);background:var(--bg);overflow:hidden}
  .wrap{display:flex;flex-direction:column;height:100vh}
  .bar{display:flex;align-items:center;gap:14px;padding:10px 16px;background:var(--panel);border-bottom:1px solid var(--line)}
  .bar.bottom{border-bottom:0;border-top:1px solid var(--line);flex-direction:column;align-items:stretch;gap:8px}
  .title{font-weight:700;margin-right:4px}
  .hint{margin-left:auto;color:var(--mut);font-size:11px}
  .unit{color:var(--mut);font-size:11px}
  .btn{border:1px solid var(--line);background:var(--bg);color:var(--ink);border-radius:6px;padding:5px 11px;cursor:pointer;font:inherit}
  .btn:hover{border-color:var(--accent);color:#fff}
  .fld{display:flex;align-items:center;gap:6px;color:var(--mut);font-size:12px;cursor:pointer}
  .stage{position:relative;flex:1}canvas{display:block;width:100%;height:100%}
  .readout{position:absolute;top:12px;left:14px;color:var(--mut);font-size:12px;font-variant-numeric:tabular-nums;white-space:pre-line;line-height:1.6;pointer-events:none}
  .axis{font-weight:700}.ax-x{color:#ff6b6b}.ax-y{color:#7ee0a0}.ax-z{color:#5aa7ff}
  .axrow{display:flex;align-items:center;gap:8px}
  .axlabel{width:16px;text-align:center}
  .chips{display:flex;flex-wrap:wrap;gap:6px}
  .chip{display:inline-flex;align-items:center;background:var(--bg);border:1px solid var(--line);border-radius:6px;overflow:hidden}
  .chip input{width:56px;border:0;background:transparent;color:var(--ink);font:inherit;padding:5px 6px;text-align:right}
  .chip .rm{border:0;background:transparent;color:var(--mut);cursor:pointer;padding:0 7px;font-size:14px;line-height:1}
  .chip .rm:hover{color:#ff6b6b}
  .add{border:1px dashed var(--line);background:transparent;color:var(--mut);border-radius:6px;padding:5px 10px;cursor:pointer;font:inherit}
  .add:hover{color:var(--ink);border-color:var(--accent)}
  .qp{display:flex;flex-wrap:wrap;gap:4px;align-items:center}
  .pick{border:1px solid var(--line);background:transparent;color:var(--mut);border-radius:5px;padding:3px 6px;cursor:pointer;font:inherit;font-size:11px}
  .pick:hover{color:var(--ink);border-color:var(--accent)}
  .bar.tools{flex-wrap:wrap;gap:8px}
  .el{border:1px solid var(--line);background:var(--bg);color:var(--mut);border-radius:6px;padding:5px 11px;cursor:pointer;font:inherit;font-size:12px}
  .el:hover{color:var(--ink)} .el.on{color:#fff;border-color:var(--accent);background:#172132}
  .swatches{display:flex;gap:4px;flex-wrap:wrap}
  .sw{width:20px;height:20px;border-radius:4px;border:2px solid transparent;cursor:pointer;padding:0}
  .sw:hover{border-color:var(--mut)} .sw.on{border-color:#fff}
  .doortypes{display:none;align-items:center;gap:6px}
  .dt{border:1px solid var(--line);background:var(--bg);color:var(--mut);border-radius:5px;padding:4px 8px;cursor:pointer;font:inherit;font-size:11px}
  .dt:hover{color:var(--ink)} .dt.on{color:#fff;border-color:var(--accent);background:#172132}
  .knobctl{display:none;align-items:center;gap:6px}
  .kb{border:1px solid var(--line);background:var(--bg);color:var(--mut);border-radius:5px;padding:4px 8px;cursor:pointer;font:inherit;font-size:11px}
  .kb:hover{color:var(--ink)} .kb.on{color:#fff;border-color:var(--accent);background:#172132}
  .work{flex:1;display:flex;min-height:0}
  .catalog{width:196px;flex:none;overflow-y:auto;background:var(--panel);border-right:1px solid var(--line);padding:9px 9px 26px}
  .cat-intro{color:var(--mut);font-size:11px;margin-bottom:6px}
  .cat-h{color:var(--ink);font-weight:700;font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;margin:11px 0 5px}
  .cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
  .tile{position:relative;display:flex;flex-direction:column;align-items:center;gap:2px;border:1px solid var(--line);background:var(--bg);border-radius:7px;padding:6px 4px 4px;cursor:grab;user-select:none}
  .tile:hover{border-color:var(--accent)} .tile.disabled{opacity:.4;cursor:default}
  .tile svg{width:46px;height:34px;display:block}
  .tile .cap{font-size:9.5px;color:var(--mut);text-align:center;line-height:1.1}
  .rdot{position:absolute;top:4px;right:4px;width:6px;height:6px;border-radius:50%}
  .rd-vface,.rd-hface{background:#7ee0a0} .rd-edge{background:#9fb4d6} .rd-base{background:#e0a85a}
  .depth-row{display:flex;gap:4px;margin:2px 0 4px}
  .depth-tile{flex:1;border:1px solid var(--line);background:var(--bg);border-radius:6px;padding:5px 0;text-align:center;font-size:11px;color:var(--mut);cursor:pointer}
  .depth-tile:hover{border-color:var(--accent);color:var(--ink)} .depth-tile.on{border-color:var(--accent);color:#fff;background:#172132}
  .ghost{position:fixed;z-index:50;pointer-events:none;background:var(--accent);color:#fff;font-size:11px;padding:3px 8px;border-radius:5px;box-shadow:0 2px 8px rgba(0,0,0,.45)}
  .props{position:absolute;top:12px;right:14px;width:200px;background:rgba(16,19,26,.94);border:1px solid var(--line);border-radius:8px;padding:9px 10px;font-size:11px;color:var(--ink);display:none}
  .props.show{display:block}
  .props h4{margin:0 0 3px;font-size:12.5px;padding-right:14px}
  .props .pk{color:var(--mut);line-height:1.5}
  .props canvas{width:100%;height:120px;display:block;background:#070a0f;border:1px solid var(--line);border-radius:6px;margin:7px 0 5px}
  .props .close{position:absolute;top:6px;right:9px;cursor:pointer;color:var(--mut);font-size:14px;line-height:1}
  .props .close:hover{color:var(--ink)}
</style></head>
<body><div class="wrap">
  <div class="bar">
    <span class="title">Wireframe Configurator</span>
    <button class="btn" id="undo">Undo</button>
    <button class="btn" id="clear">Clear</button>
    <label class="fld"><input type="checkbox" id="feet" checked> foot nodes</label>
    <label class="fld"><input type="checkbox" id="meshes"> meshes</label>
    <span class="unit">click two dots to place the active element</span>
    <span class="hint">drag = orbit · wheel = zoom · Esc = cancel · Ctrl/⌘+Z = undo</span>
  </div>
  <div class="bar tools">
    <span class="unit">place</span>
    <button class="el" data-kind="tube">Tube</button>
    <button class="el" data-kind="panel">Panel</button>
    <button class="el" data-kind="glass">Glass</button>
    <button class="el" data-kind="door">Door</button>
    <button class="el" data-kind="shelf">Shelf</button>
    <span class="unit" style="margin-left:14px">colour</span>
    <span class="swatches" id="swatches"></span>
    <span class="unit">USM palette — real (materials.xml); graphite=RAL-derived</span>
    <span class="doortypes" id="doortypes">
      <span class="unit">· door type</span>
      <button class="dt" data-dt="dropdown">Drop-down</button>
      <button class="dt" data-dt="retractable">Retractable</button>
      <button class="dt" data-dt="glass">Glass</button>
    </span>
    <span class="knobctl" id="knobctl">
      <span class="unit">· knob</span>
      <button class="kb" data-kb="left">Left</button>
      <button class="kb" data-kb="right">Right</button>
    </span>
  </div>
  <div class="work">
    <aside class="catalog" id="catalog"></aside>
    <div class="stage"><canvas id="cv"></canvas><div class="readout" id="readout"></div><div class="props" id="props"></div></div>
  </div>
  <div class="bar bottom">
    <div class="axrow"><span class="axis ax-x axlabel">X</span><div class="chips" id="xs"></div><button class="add" data-axis="xs">+ dim</button><span class="unit">width ·</span><span class="qp" id="qp-xs"></span></div>
    <div class="axrow"><span class="axis ax-y axlabel">Y</span><div class="chips" id="ys"></div><button class="add" data-axis="ys">+ dim</button><span class="unit">depth ·</span><span class="qp" id="qp-ys"></span></div>
    <div class="axrow"><span class="axis ax-z axlabel">Z</span><div class="chips" id="zs"></div><button class="add" data-axis="zs">+ dim</button><span class="unit">height ·</span><span class="qp" id="qp-zs"></span></div>
  </div>
</div>
<script>
// ---------- model: per-segment dimension lists per axis (mm, free). dots on an axis = segments + 1 ----------
const model = { xs: [750, 750], ys: [350], zs: [350, 350] };   // default: 2-bay sideboard, depth 350, 2 levels (all standard USM)

// grid dimension = tube dimension (ball center-to-center), used AS-IS. ball only ADDS to the outside dim.
// BALL_ADDITION = ball connector diameter. Source-verified: Kugel.obj Ø 23.396 mm; start_configure.json 350→373.4.
const BALL_ADDITION = 23;   // mm — configurable system constant
// foot lifts the bottom balls off the floor. Source-verified: real bottom node z = 3 cm, foot z = 0.
const FOOT_LIFT = 30;       // mm — configurable system constant
// USM Haller tube-length grid (axis-to-axis, mm). Width/height and depth are DIFFERENT sets. Source: usm-haller-system skill.
const VOCAB_WH = [100, 150, 175, 250, 350, 395, 500, 750];   // width & height
const VOCAB_D  = [250, 350, 500, 750];                        // depth (coarser — no 100/150/175/395)
const vocabFor = key => key === 'ys' ? VOCAB_D : VOCAB_WH;    // ys = depth axis
// canonical part dims (catalog audit, source-verified): tube outer Ø 19 mm; each tube end carries a Connector
// (art 12451) → 2 per tube; tube physical length = grid − 17.7 mm (~8.85 mm into each ball). Axis-to-axis still = grid.
const TUBE_DIA = 19;             // mm
const CONNECTOR_PER_TUBE = 2;
const tubePhysLen = grid => +(grid - 17.7).toFixed(1);

function axisCoords(gaps){
  const pos = [0];
  for (const g of gaps) pos.push(pos[pos.length-1] + g);
  const total = pos[pos.length-1];
  return pos.map(p => p - total/2);   // centred on origin
}
function generateMatrix(m){
  const X = axisCoords(m.xs), Y = axisCoords(m.ys), Z = axisCoords(m.zs);
  const dots = [];
  for (const x of X) for (const y of Y) for (const z of Z) dots.push([x,y,z]);
  return dots;
}
// canonical key for an undirected bottom-plane edge between two (i,j) balls
const edgeKey = (i1,j1,i2,j2) => (i1<i2||(i1===i2&&j1<=j2)) ? `${i1},${j1}_${i2},${j2}` : `${i2},${j2}_${i1},${j1}`;
// bottom balls (k=0, lowest height) that are a corner of a cell CLOSED by 4 drawn tubes.
function closedBottomCorners(){
  const [NX,NY]=dims();
  const E=new Set();                                   // drawn orthogonal tubes in the bottom plane
  for(const ln of lines){
    if(ln.kind!=='tube') continue;                     // only tubes close a base cell
    if(ln.a[2]!==0 || ln.b[2]!==0) continue;           // bottom plane only
    const di=Math.abs(ln.a[0]-ln.b[0]), dj=Math.abs(ln.a[1]-ln.b[1]);
    if(di+dj!==1) continue;                            // adjacent + orthogonal (a tube), not a diagonal
    E.add(edgeKey(ln.a[0],ln.a[1],ln.b[0],ln.b[1]));
  }
  const has=(i1,j1,i2,j2)=>E.has(edgeKey(i1,j1,i2,j2));
  const corners=new Set();
  for(let i=0;i<NX-1;i++)for(let j=0;j<NY-1;j++){       // a cell is closed iff all 4 of its edges are drawn
    if(has(i,j,i+1,j) && has(i+1,j,i+1,j+1) && has(i,j+1,i+1,j+1) && has(i,j,i,j+1)){
      corners.add(`${i},${j}`); corners.add(`${i+1},${j}`); corners.add(`${i},${j+1}`); corners.add(`${i+1},${j+1}`);
    }
  }
  return corners;
}
// general 3D undirected edge key (any plane) + the set of drawn orthogonal tubes
const edge3 = (p,q) => { const a=p.join(','), b=q.join(','); return a<b ? a+'_'+b : b+'_'+a; };
function tubeEdges(){ const S=new Set();
  for(const ln of lines){ if(ln.kind!=='tube') continue;
    if(Math.abs(ln.a[0]-ln.b[0])+Math.abs(ln.a[1]-ln.b[1])+Math.abs(ln.a[2]-ln.b[2])!==1) continue;   // a real tube = one grid step
    S.add(edge3(ln.a,ln.b)); }
  return S; }
// a face element (panel/glass/door/shelf) only belongs where its 4 perimeter edges are ALL drawn tubes — i.e. a real framed compartment
function faceFramed(A,B){
  const fix=A[0]===B[0]?0:A[1]===B[1]?1:2, vary=[0,1,2].filter(x=>x!==fix);
  const c1=A.slice(); c1[vary[0]]=B[vary[0]];
  const c2=A.slice(); c2[vary[1]]=B[vary[1]];
  const q=[A,c1,B,c2], S=tubeEdges();
  for(let i=0;i<4;i++) if(!S.has(edge3(q[i],q[(i+1)%4]))) return false;
  return true;
}
// full placement test = geometry (placeValid) AND, for face elements, a surrounding tube frame
function placeOK(A,B,kind){ return placeValid(A,B,kind) && (isFace(kind) ? faceFramed(A,B) : true); }
// classify a drawn line: orthogonal-adjacent = tube; coplanar (exactly one axis fixed) = panel; else a plain line.
function lineKind(ln){
  const da=Math.abs(ln.a[0]-ln.b[0]), db=Math.abs(ln.a[1]-ln.b[1]), dc=Math.abs(ln.a[2]-ln.b[2]);
  if(da+db+dc===1) return 'tube';
  if([da,db,dc].filter(v=>v===0).length===1) return 'panel';   // one axis fixed → lies in a face/plane → a panel
  return 'line';
}
// the 4 corner nodes (i,j,k) of the face a planar (panel) line spans
function panelQuad(ln){
  const a=ln.a, b=ln.b;
  const fix = a[0]===b[0] ? 0 : a[1]===b[1] ? 1 : 2;     // the axis the panel is normal to
  const vary=[0,1,2].filter(x=>x!==fix);
  const c1=a.slice(); c1[vary[0]]=b[vary[0]];
  const c2=a.slice(); c2[vary[1]]=b[vary[1]];
  return [a, c1, b, c2];                                 // rectangle traversal a→c1→b→c2
}
// the two in-plane dimensions (mm) of a panel face — sum of segment lengths it spans on each varying axis
function panelDimsMM(ln){
  const a=ln.a, b=ln.b;
  const fix = a[0]===b[0] ? 0 : a[1]===b[1] ? 1 : 2;
  const vary=[0,1,2].filter(x=>x!==fix);
  const lists=[model.xs, model.ys, model.zs];
  const span=ax=>{ const lo=Math.min(a[ax],b[ax]), hi=Math.max(a[ax],b[ax]); let s=0; for(let k=lo;k<hi;k++) s+=lists[ax][k]; return s; };
  return [span(vary[0]), span(vary[1])];
}
// foot nodes: at the corner balls of every base cell closed by 4 tubes, FOOT_LIFT below the lowest height (Z).
function generateFeet(m){
  const X = axisCoords(m.xs), Y = axisCoords(m.ys), Z = axisCoords(m.zs);
  const zb = Z[0] - FOOT_LIFT;
  const feet = [];
  for (const key of closedBottomCorners()){ const [i,j]=key.split(',').map(Number); feet.push([X[i], Y[j], zb]); }
  return feet;
}
const sum = a => a.reduce((s,v)=>s+v,0);
const dims = () => [model.xs.length+1, model.ys.length+1, model.zs.length+1];   // [NX,NY,NZ]
// dots are generated x-outer, y-mid, z-inner → flat index of lattice node (i,j,k):
const flatOf = (i,j,k) => { const [,NY,NZ]=dims(); return (i*NY+j)*NZ+k; };
const ijkOf  = f => { const [,NY,NZ]=dims(); return [Math.floor(f/(NZ*NY)), Math.floor(f/NZ)%NY, f%NZ]; };
const inRange = ([i,j,k]) => { const [NX,NY,NZ]=dims(); return i>=0&&i<NX&&j>=0&&j<NY&&k>=0&&k<NZ; };

// ---------- 3D render (canvas, orbit camera) ----------
const cv = document.getElementById('cv'), ctx = cv.getContext('2d');
const cam = { yaw:-0.4, pitch:0.18, dist:1, f:1 };   // front-facing default for the px-native Z-up scene
let DOTS = [], PROJ = [], FEET = [];
// user-drawn elements, stored as {a:[i,j,k], b:[i,j,k], kind, colour} so they survive dimension edits
let lines = [], sel = null, hover = null;
// element palette + USM colour palette
const FACE_KINDS = ['panel','glass','door','shelf'];
const isFace = k => FACE_KINDS.includes(k);
// glass-styled: glass cladding panel, glass door, or glass shelf (Glas-Zwischentablar)
const isGlassy = ln => ln.kind==='glass' || (ln.kind==='door'&&ln.doorType==='glass') || (ln.kind==='shelf'&&ln.variant==='glass');
const hexA = (h,a)=>{ const n=parseInt(h.slice(1),16); return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`; };
const COLOURS = [   // REAL USM powder-coat palette — diffuse hex DECODED from materials.xml; EN names from gl_h_metall
  {n:'Pure white',hex:'#dddddd'}, {n:'Light grey',hex:'#a0a09b'}, {n:'USM mid-grey',hex:'#64645f'},
  {n:'Anthracite',hex:'#323232'}, {n:'Graphite black',hex:'#1c1c1c'}, {n:'Steel blue',hex:'#0a0a32'},
  {n:'Gentian blue',hex:'#004f7c'}, {n:'Golden yellow',hex:'#c89628'}, {n:'Pure orange',hex:'#d75a0c'},
  {n:'USM green',hex:'#006b03'}, {n:'USM ruby red',hex:'#87122d'}, {n:'USM beige',hex:'#ab916c'},
  {n:'USM brown',hex:'#46352c'}, {n:'Olive green',hex:'#525d3c'}, {n:'Matte silver',hex:'#8c8c91'},
];   // graphite black #1c1c1c = RAL-9011-derived (no RGB in source); matte silver = USM-internal-restricted
let activeKind = 'tube', activeColour = '#a0a09b', placeMsg = '', activeDoorType = 'dropdown', activeKnob = 'right';

function project(p){
  const cyw=Math.cos(cam.yaw),syw=Math.sin(cam.yaw); let x=p[0]*cyw - p[2]*syw, z=p[0]*syw + p[2]*cyw;
  const cp=Math.cos(cam.pitch),sp=Math.sin(cam.pitch); let y=p[1]*cp - z*sp; z=p[1]*sp + z*cp;
  const d=z+cam.dist; if(d<=1) return null;
  return { x: cv.width/2 + x*cam.f/d, y: cv.height/2 - y*cam.f/d, depth:d };
}
// px-native Z-up (X=width, Y=depth, Z=height) → Y-up render space, via the SAME RotX(-90°) the engine uses (posToRK).
const world = p => [p[0], p[2], -p[1]];
function fit(){
  cv.width=cv.clientWidth; cv.height=cv.clientHeight;
  let r=0; for(const p of DOTS) r=Math.max(r, Math.hypot(p[0],p[1],p[2]));
  r=Math.max(r, 1);
  cam.dist = r*3.2; cam.f = Math.min(cv.width,cv.height)*0.55*cam.dist/r;
}
// rotate a direction vector by the camera (no perspective) → screen offset + depth
function rotDir(v){
  const cyw=Math.cos(cam.yaw),syw=Math.sin(cam.yaw); let x=v[0]*cyw - v[2]*syw, z=v[0]*syw + v[2]*cyw;
  const cp=Math.cos(cam.pitch),sp=Math.sin(cam.pitch); let y=v[1]*cp - z*sp; z=v[1]*sp + z*cp;
  return {x, y, depth:z};   // x→screen-right, y→screen-up, larger depth = farther from camera
}
// fixed corner orientation gizmo (rotates with the orbit), colours match the X/Y/Z editor
function drawGizmo(){
  const ax=58, ay=cv.height-58, L=34;
  const items=[{v:[1,0,0],c:'#ff6b6b',l:'X'},{v:[0,1,0],c:'#7ee0a0',l:'Y'},{v:[0,0,1],c:'#5aa7ff',l:'Z'}]
    .map(a=>{const r=rotDir(world(a.v)); return {...a, sx:ax+r.x*L, sy:ay-r.y*L, depth:r.depth};})
    .sort((p,q)=>q.depth-p.depth);                 // far axes first so near ones overlay
  ctx.save(); ctx.lineCap='round';
  ctx.fillStyle='rgba(140,150,170,0.9)'; ctx.beginPath(); ctx.arc(ax,ay,2.5,0,7); ctx.fill();
  for(const it of items){
    const a = it.depth<=0 ? 1 : 0.45;              // axis pointing away → dimmer
    ctx.globalAlpha=a; ctx.strokeStyle=it.c; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(ax,ay); ctx.lineTo(it.sx,it.sy); ctx.stroke();
    ctx.fillStyle=it.c; ctx.font='bold 11px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(it.l, ax+(it.sx-ax)*1.2, ay+(it.sy-ay)*1.2);
  }
  ctx.restore();
}
function draw(){
  if(SOLVED){ renderSolved(); return; }                          // solved-configuration mode: render the engine's pos+quat directly
  cv.width=cv.clientWidth; cv.height=cv.clientHeight; ctx.clearRect(0,0,cv.width,cv.height);
  const P = DOTS.map(d=>project(world(d))); PROJ = P;

  const meshMode = !!(document.getElementById('meshes') && document.getElementById('meshes').checked);
  if(meshMode) renderMeshes();                                  // real .obj/.3d geometry in the scene
  if(!meshMode){
  // face elements (panel/glass/door/shelf): fill the face they span, in their element style + USM colour
  ctx.lineCap='round';
  for(const ln of lines){
    if(!inRange(ln.a)||!inRange(ln.b)) continue;
    if(!isFace(ln.kind) || lineKind(ln)!=='panel') continue;    // only planar faces get a fill
    const q = panelQuad(ln).map(c=>P[flatOf(...c)]); if(!q.every(Boolean)) continue;
    let fill, edge;
    const glassLike = isGlassy(ln);
    if(glassLike){ fill='rgba(155,205,228,0.16)'; edge='rgba(165,210,232,0.55)'; }
    else { const c=ln.colour||'#9aa6b2'; fill=hexA(c,0.55); edge=hexA(c,0.95); }
    ctx.fillStyle=fill; ctx.beginPath(); ctx.moveTo(q[0].x,q[0].y); for(let i=1;i<4;i++)ctx.lineTo(q[i].x,q[i].y); ctx.closePath(); ctx.fill();
    ctx.strokeStyle=edge; ctx.lineWidth=1.2; ctx.stroke();
    if(ln.kind==='door'){
      const qc=panelQuad(ln);
      const bar=idx=>{ if(idx.length===2){ const A=q[idx[0]],B=q[idx[1]]; ctx.strokeStyle='rgba(255,255,255,0.72)'; ctx.lineWidth=2.6; ctx.beginPath();ctx.moveTo(A.x,A.y);ctx.lineTo(B.x,B.y);ctx.stroke(); } };
      const dot=(x,y)=>{ ctx.fillStyle='rgba(15,17,20,0.85)'; ctx.beginPath();ctx.arc(x,y,2.7,0,7);ctx.fill(); };
      if(ln.doorType==='glass'){                                    // side-hinged: hinge on the edge OPPOSITE the knob
        const a=ln.a,b=ln.b, fix=a[0]===b[0]?0:a[1]===b[1]?1:2, hAx=[0,1,2].filter(x=>x!==fix).find(v=>v!==2); // horizontal axis of the face
        const hs=qc.map(c=>c[hAx]), lo=Math.min(...hs), hi=Math.max(...hs);
        const knobV = ln.knob==='left'?lo:hi, hingeV = ln.knob==='left'?hi:lo;
        bar(qc.map((c,i)=>c[hAx]===hingeV?i:-1).filter(i=>i>=0));     // hinge bar on hinge edge
        const ke=qc.map((c,i)=>c[hAx]===knobV?i:-1).filter(i=>i>=0);  // knob dot mid the knob edge
        if(ke.length===2) dot((q[ke[0]].x+q[ke[1]].x)/2,(q[ke[0]].y+q[ke[1]].y)/2);
      } else {                                                       // drop-down (bottom) / flip-up (top) horizontal hinge
        const ks=qc.map(c=>c[2]), want = ln.doorType==='flipup' ? Math.max(...ks) : Math.min(...ks);
        bar(qc.map((c,i)=>c[2]===want?i:-1).filter(i=>i>=0));
        dot((q[0].x+q[2].x)/2,(q[0].y+q[2].y)/2);
      }
    }
  }
  // strokes: tubes are bright chrome rods; face-element diagonals are thin colour strokes
  for(const ln of lines){
    if(!inRange(ln.a)||!inRange(ln.b)) continue;
    const A=P[flatOf(...ln.a)], B=P[flatOf(...ln.b)]; if(!A||!B) continue;
    if(ln.kind==='tube'){ ctx.strokeStyle='rgba(170,188,216,0.95)'; ctx.lineWidth=1.7; }
    else { const gl = isGlassy(ln);
      ctx.strokeStyle = gl ? 'rgba(165,210,232,0.6)' : hexA(ln.colour||'#9aa6b2',0.7); ctx.lineWidth=1.2; }
    ctx.beginPath(); ctx.moveTo(A.x,A.y); ctx.lineTo(B.x,B.y); ctx.stroke();
  }
  }
  // rubber-band from the selected dot to whatever you're hovering
  if(sel!=null && hover!=null && hover!==sel){
    const A=P[sel], B=P[hover];
    if(A&&B){ const ok=placeOK(ijkOf(sel),ijkOf(hover),activeKind);   // green = valid target (geometry + frame), red = not
      ctx.save(); ctx.setLineDash([5,4]); ctx.strokeStyle= ok?'rgba(126,224,160,0.95)':'rgba(228,120,120,0.9)'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(A.x,A.y); ctx.lineTo(B.x,B.y); ctx.stroke(); ctx.restore(); }
  }

  // dots, far-to-near so nearer dots sit on top; depth-shaded; selected/hovered highlighted
  const order = P.map((p,i)=>({p,i})).filter(o=>o.p).sort((a,b)=>b.p.depth-a.p.depth);
  const vis = P.filter(Boolean);
  const dmin=Math.min(...vis.map(p=>p.depth)), dmax=Math.max(...vis.map(p=>p.depth));
  for(const {p,i} of order){
    const t = dmax>dmin ? (p.depth-dmin)/(dmax-dmin) : 0;
    const shade = 1 - t*0.55; let rad = 5 - t*2;
    const isSel=(i===sel), isHov=(i===hover);
    if(isSel||isHov) rad=Math.max(rad,4.6);
    ctx.fillStyle = isSel ? 'rgba(90,167,255,1)' : isHov ? 'rgba(126,224,160,1)'
                  : `rgba(${Math.round(231*shade)},${Math.round(235*shade)},${Math.round(243*shade)},1)`;
    ctx.beginPath(); ctx.arc(p.x,p.y,rad,0,7); ctx.fill();
    ctx.strokeStyle = isSel ? 'rgba(90,167,255,0.95)' : `rgba(90,167,255,${0.5-t*0.35})`; ctx.lineWidth=1.1;
    ctx.beginPath(); ctx.arc(p.x,p.y,rad+3,0,7); ctx.stroke();
  }
  // foot nodes — recomputed from the drawn tubes each frame; only at corners of base cells closed by 4 tubes
  FEET = generateFeet(model);
  if(document.getElementById('feet').checked){
    const FC = baseType==='castor' ? [120,150,200] : baseType==='glide' ? [180,182,178] : [228,168,92];   // colour by base type
    const round = baseType!=='foot';                                                                       // castor/glide = round, foot = square
    for(const d of FEET){ const p=project(world(d)); if(!p)continue;
      const t = dmax>dmin ? Math.max(0,Math.min(1,(p.depth-dmin)/(dmax-dmin))) : 0;
      const s = 8 - t*3;
      ctx.fillStyle=`rgba(${FC[0]},${FC[1]},${FC[2]},${1-t*0.4})`;
      ctx.strokeStyle=`rgba(${FC[0]},${FC[1]},${FC[2]},${0.55-t*0.3})`; ctx.lineWidth=1;
      if(round){ ctx.beginPath();ctx.arc(p.x,p.y,s*0.55,0,7);ctx.fill(); ctx.beginPath();ctx.arc(p.x,p.y,s*0.55+2.5,0,7);ctx.stroke(); }
      else { ctx.fillRect(p.x-s/2, p.y-s/2, s, s); ctx.strokeRect(p.x-s/2-2.5, p.y-s/2-2.5, s+5, s+5); }
    }
  }
  // drag-and-drop: highlight the valid drop target (green) for the part being dragged
  if(dragItem && dropTarget && dropTarget.hit){
    const h=dropTarget.hit; ctx.save();
    if(dropTarget.t==='edge'){ const A=PROJ[flatOf(...h.a)],B=PROJ[flatOf(...h.b)]; if(A&&B){ ctx.strokeStyle='rgba(126,224,160,0.95)'; ctx.lineWidth=3.5; ctx.lineCap='round'; ctx.beginPath();ctx.moveTo(A.x,A.y);ctx.lineTo(B.x,B.y);ctx.stroke(); } }
    else if(dropTarget.t==='face'){ const pr=h.corners.map(c=>PROJ[flatOf(...c)]); const ok=faceFramed(h.a,h.b); if(pr.every(Boolean)){ ctx.fillStyle= ok?'rgba(126,224,160,0.22)':'rgba(228,120,120,0.20)'; ctx.strokeStyle= ok?'rgba(126,224,160,0.9)':'rgba(228,120,120,0.9)'; ctx.lineWidth=2; ctx.beginPath();ctx.moveTo(pr[0].x,pr[0].y);for(let i=1;i<4;i++)ctx.lineTo(pr[i].x,pr[i].y);ctx.closePath();ctx.fill();ctx.stroke(); } }
    else if(dropTarget.t==='ball'){ const p=PROJ[flatOf(...h)]; if(p){ ctx.strokeStyle='rgba(126,224,160,0.95)'; ctx.lineWidth=2.5; ctx.beginPath();ctx.arc(p.x,p.y,9,0,7);ctx.stroke(); } }
    else if(dropTarget.t==='cell' && h){ const pr=h.corners.map(c=>PROJ[flatOf(...c)]); if(pr.every(Boolean)){ ctx.strokeStyle='rgba(126,224,160,0.95)'; ctx.lineWidth=2.5; for(const [u,w] of CELL_EDGES){ ctx.beginPath();ctx.moveTo(pr[u].x,pr[u].y);ctx.lineTo(pr[w].x,pr[w].y);ctx.stroke(); } } }
    ctx.restore();
  }
  drawGizmo();
  status();
}
function status(){
  const gx=sum(model.xs), gy=sum(model.ys), gz=sum(model.zs); const [NX,NY,NZ]=dims();
  const c={tube:0,panel:0,glass:0,door:0,shelf:0}; for(const l of lines) c[l.kind]=(c[l.kind]||0)+1;
  const infill=c.panel+c.glass+c.door+c.shelf;
  const balls=new Set(); for(const l of lines) if(l.kind==='tube'){ balls.add(l.a.join(',')); balls.add(l.b.join(',')); }
  let l3 = `balls ${balls.size} · tubes ${c.tube} Ø${TUBE_DIA} · connectors ${c.tube*CONNECTOR_PER_TUBE} · infill ${infill} (panel ${c.panel} glass ${c.glass} door ${c.door} shelf ${c.shelf}) · feet ${FEET.length}`;
  if(sel!=null){ const [i,j,k]=ijkOf(sel); l3 += ` · from (${i},${j},${k})`; l3 += placeMsg ? ` · ✗ ${placeMsg}` : ' — Esc'; }
  else l3 += placeMsg ? ` · ✗ ${placeMsg}` : ` · placing: ${activeKind}`;
  // --- validation against USM rules (grid vocabulary, panel sizes, stability) ---
  const w=[];
  if(model.xs.some(v=>!VOCAB_WH.includes(v))) w.push('X width non-standard');
  if(model.ys.some(v=>!VOCAB_D.includes(v)))  w.push('Y depth non-standard');
  if(model.zs.some(v=>!VOCAB_WH.includes(v))) w.push('Z height non-standard');
  let badP=0;
  for(const ln of lines){ if(!isFace(ln.kind) || lineKind(ln)!=='panel') continue;
    const a=ln.a,b=ln.b; const fix=a[0]===b[0]?0:a[1]===b[1]?1:2;
    if(fix===2) continue;                              // horizontal (shelf/top) — width×height panel rule N/A
    const d=panelDimsMM(ln);
    if((d[0]<=175 && d[1]<=175) || (d[0]===750 && d[1]===750)) badP++; }
  if(badP) w.push(`${badP} panel(s) not a USM size (both ≤175 or 750×750)`);
  const unitH = gz + BALL_ADDITION + FOOT_LIFT;            // ≈ whole-unit height incl. ball + feet (mm)
  if(unitH>=1780)      w.push(`tall — wall-mount strongly advised (≈${Math.round(unitH/10)} cm)`);
  else if(unitH>=1090) w.push(`wall-mount recommended (≈${Math.round(unitH/10)} cm)`);
  const l4 = w.length ? `\n⚠ ${w.join('  ·  ')}` : '';
  // required hardware auto-added per placed part (source: *set assemblies) — derived BOM
  const hw={}; for(const l of lines) for(const p of requiredPartsFor(l)) hw[p.n]=(hw[p.n]||0)+p.q;
  const l5 = Object.keys(hw).length ? `\n+ hardware: `+Object.entries(hw).map(([n,q])=>`${q}× ${n}`).join(' · ') : '';
  document.getElementById('readout').textContent =
    `${NX} × ${NY} × ${NZ} = ${DOTS.length} dots · X[${model.xs.join(', ')||'—'}] Y[${model.ys.join(', ')||'—'}] Z[${model.zs.join(', ')||'—'}] mm\n`+
    `grid ${gx} × ${gy} × ${gz} mm · outside ${gx+BALL_ADDITION} × ${gy+BALL_ADDITION} × ${gz+BALL_ADDITION} mm  (+${BALL_ADDITION} ball)\n`+ l3 + l4 + l5;
}

// nearest projected dot to a canvas point, within a pick radius (px); -1 if none
function pick(mx,my){
  let best=-1, bd=16*16;
  for(let i=0;i<PROJ.length;i++){ const p=PROJ[i]; if(!p)continue; const dx=p.x-mx,dy=p.y-my,d=dx*dx+dy*dy; if(d<bd){bd=d;best=i;} }
  return best;
}
// build the element being placed: glass + tube carry no colour; a door carries its sub-type (glass door = clear).
function makeEl(A,B){
  const el = { a:A, b:B, kind:activeKind, colour:(activeKind==='tube'||activeKind==='glass')?null:activeColour };
  if(activeKind==='door'){ el.doorType=activeDoorType; if(activeDoorType==='glass'){ el.colour=null; el.knob=activeKnob; } }
  return el;
}
// is placing the active element between two lattice nodes A,B geometrically valid?
function placeValid(A,B,kind){
  const d=[Math.abs(A[0]-B[0]),Math.abs(A[1]-B[1]),Math.abs(A[2]-B[2])];
  if(kind==='tube') return d[0]+d[1]+d[2]===1;             // a tube = one grid step (adjacent balls)
  const ones=d.filter(v=>v===1).length, zeros=d.filter(v=>v===0).length;
  if(!(ones===2 && zeros===1)) return false;              // face element = diagonal of exactly ONE cell face
  const fix = d[0]===0?0 : d[1]===0?1 : 2;                // face-normal axis (0=X side, 1=Y front/back, 2=Z horizontal)
  if(kind==='shelf') return fix===2;                     // shelf (Tablar) = horizontal cell only
  if(kind==='panel') return true;                        // metal panel (Blech) = ANY framed face — sides/back AND top/bottom closing panels
  return fix!==2;                                        // glass / door = vertical compartment face
}
function reqText(kind){
  if(kind==='tube')  return 'a tube spans two adjacent balls (one grid step)';
  if(kind==='shelf') return 'a shelf is the diagonal of one horizontal cell (width × depth)';
  if(kind==='panel') return 'a panel is the diagonal of any framed cell face (a side/back, or a top/bottom closing panel)';
  return `a ${kind} is the diagonal of one vertical compartment face`;
}
function clickDot(flat){
  if(flat<0){ sel=null; placeMsg=''; draw(); return; }     // clicked empty space → cancel
  if(sel===null){ sel=flat; placeMsg=''; }
  else if(sel===flat){ sel=null; placeMsg=''; }            // clicked the same dot → cancel
  else {
    const A=ijkOf(sel), B=ijkOf(flat);
    if(placeValid(A,B,activeKind)){                        // geometry valid
      let blocked='';
      if(isFace(activeKind) && !faceFramed(A,B)) blocked=`no frame here — a ${activeKind} needs 4 tubes around this face`;
      else if(activeKind==='panel'||activeKind==='glass'){ // USM panel-size rule (fixed infills only — doors exempt)
        const d=panelDimsMM({a:A,b:B});
        if(d[0]<=175 && d[1]<=175) blocked=`${activeKind} ${d[0]}×${d[1]} — no panel when both sides ≤175 mm`;
        else if(d[0]===750 && d[1]===750) blocked=`${activeKind} 750×750 — not a USM panel size`;
      }
      if(!blocked){ const pt=plausTypeFor(activeKind, activeDoorType, undefined), sr=pt&&sizeReason({a:A,b:B},pt);   // per-part allowed-size rule (source)
        if(sr) blocked=`${activeKind} doesn’t fit this compartment — ${sr} (USM rule)`; }
      if(blocked){ placeMsg=blocked; }                     // rule violation → keep start, explain
      else { lines.push(makeEl(A,B)); sel=flat; placeMsg=''; }   // place + chain on
    } else { placeMsg=`can’t place ${activeKind} there — ${reqText(activeKind)}`; }   // invalid geometry
  }
  draw();
}

// ---------- per-axis dimension list editor ----------
function renderAxis(key){
  const wrap = document.getElementById(key); wrap.innerHTML='';
  model[key].forEach((v,i)=>{
    const chip=document.createElement('span'); chip.className='chip';
    const inp=document.createElement('input'); inp.type='number'; inp.min='1'; inp.step='1'; inp.value=v;
    inp.oninput=()=>{ let n=parseInt(inp.value,10); if(isNaN(n))return; n=Math.max(1,n); model[key][i]=n; onEdit(); };
    const rm=document.createElement('button'); rm.className='rm'; rm.textContent='×'; rm.title='remove segment';
    rm.onclick=()=>{ model[key].splice(i,1); onStruct(); };
    chip.append(inp,rm); wrap.append(chip);
  });
  if(!model[key].length){ const s=document.createElement('span'); s.className='unit'; s.textContent='(1 dot — add a dim)'; wrap.append(s); }
  // standard USM tube-length quick-picks for this axis (click to append; free entry still allowed in the chips)
  const qp=document.getElementById('qp-'+key);
  if(qp){ qp.innerHTML='';
    vocabFor(key).forEach(v=>{ const b=document.createElement('button'); b.className='pick'; b.textContent=v; b.title=`add ${v} mm`;
      b.onclick=()=>{ model[key].push(v); onStruct(); }; qp.append(b); });
  }
}

// hit-test helpers in screen space (using PROJ, the last-projected dots)
function faceCorners(vertical){
  const [NX,NY,NZ]=dims(); const F=[];
  if(vertical){
    for(let j=0;j<NY;j++)for(let i=0;i<NX-1;i++)for(let k=0;k<NZ-1;k++) F.push([[i,j,k],[i+1,j,k],[i+1,j,k+1],[i,j,k+1]]);   // front/back ⟂Y
    for(let i=0;i<NX;i++)for(let j=0;j<NY-1;j++)for(let k=0;k<NZ-1;k++) F.push([[i,j,k],[i,j+1,k],[i,j+1,k+1],[i,j,k+1]]);   // sides ⟂X
  } else {
    for(let k=0;k<NZ;k++)for(let i=0;i<NX-1;i++)for(let j=0;j<NY-1;j++) F.push([[i,j,k],[i+1,j,k],[i+1,j+1,k],[i,j+1,k]]);   // horizontal ⟂Z
  }
  return F;
}
function edgeCorners(){ const [NX,NY,NZ]=dims(); const E=[];
  for(let i=0;i<NX;i++)for(let j=0;j<NY;j++)for(let k=0;k<NZ;k++){
    if(i+1<NX)E.push([[i,j,k],[i+1,j,k]]); if(j+1<NY)E.push([[i,j,k],[i,j+1,k]]); if(k+1<NZ)E.push([[i,j,k],[i,j,k+1]]); }
  return E; }
function inPoly(px,py,pts){ let inside=false; for(let i=0,j=pts.length-1;i<pts.length;j=i++){ const xi=pts[i].x,yi=pts[i].y,xj=pts[j].x,yj=pts[j].y; if(((yi>py)!==(yj>py)) && (px < (xj-xi)*(py-yi)/(yj-yi)+xi)) inside=!inside; } return inside; }
function distSeg(px,py,a,b){ const dx=b.x-a.x,dy=b.y-a.y,l2=dx*dx+dy*dy||1; let t=((px-a.x)*dx+(py-a.y)*dy)/l2; t=Math.max(0,Math.min(1,t)); return Math.hypot(px-(a.x+t*dx), py-(a.y+t*dy)); }
function hitFace(mx,my,vertical){ let best=null,bd=1e9; for(const f of faceCorners(vertical)){ const pr=f.map(c=>PROJ[flatOf(...c)]); if(!pr.every(Boolean))continue; if(!inPoly(mx,my,pr))continue; const d=(pr[0].depth+pr[2].depth)/2; if(d<bd){ bd=d; best={corners:f, a:f[0], b:f[2], d}; } } return best; }
// like hitFace but over BOTH orientations; picks the most face-on face (largest projected area) — for the metal panel, which can close ANY face (side/back/top/bottom)
function hitFaceAny(mx,my){ let best=null,bestA=-1;
  for(const vert of [true,false]) for(const f of faceCorners(vert)){ const pr=f.map(c=>PROJ[flatOf(...c)]); if(!pr.every(Boolean)||!inPoly(mx,my,pr)) continue;
    let a=0; for(let i=0,j=3;i<4;j=i++) a+=(pr[j].x+pr[i].x)*(pr[j].y-pr[i].y); a=Math.abs(a)/2;
    if(a>bestA){ bestA=a; best={corners:f, a:f[0], b:f[2]}; } }
  return best; }
function hitEdge(mx,my){ let best=null,bd=14; for(const e of edgeCorners()){ const A=PROJ[flatOf(...e[0])],B=PROJ[flatOf(...e[1])]; if(!A||!B)continue; const d=distSeg(mx,my,A,B); if(d<bd){ bd=d; best={a:e[0], b:e[1], corners:e}; } } return best; }
function hitBall(mx,my){ const [NX,NY]=dims(); let best=null,bd=16; for(let i=0;i<NX;i++)for(let j=0;j<NY;j++){ const p=PROJ[flatOf(i,j,0)]; if(!p)continue; const d=Math.hypot(p.x-mx,p.y-my); if(d<bd){ bd=d; best=[i,j,0]; } } return best; }
// the 8 lattice corners of unit cell (i,j,k), and the 12 edges as index pairs
const CELL_CORNERS=(i,j,k)=>[[i,j,k],[i+1,j,k],[i+1,j+1,k],[i,j+1,k],[i,j,k+1],[i+1,j,k+1],[i+1,j+1,k+1],[i,j+1,k+1]];
const CELL_EDGES=[[0,1],[1,2],[2,3],[3,0],[4,5],[5,6],[6,7],[7,4],[0,4],[1,5],[2,6],[3,7]];
const CELL_FACES=[[0,1,2,3],[4,5,6,7],[0,1,5,4],[1,2,6,5],[2,3,7,6],[3,0,4,7]];
// nearest unit cell under the cursor (cursor inside the cube silhouette = inside any of its 6 projected faces)
function hitCell(mx,my){
  const [NX,NY,NZ]=dims(); let best=null,bd=1e9;
  for(let i=0;i<NX-1;i++)for(let j=0;j<NY-1;j++)for(let k=0;k<NZ-1;k++){
    const cor=CELL_CORNERS(i,j,k), pr=cor.map(c=>PROJ[flatOf(...c)]); if(!pr.every(Boolean)) continue;
    if(!CELL_FACES.some(f=>inPoly(mx,my,f.map(x=>pr[x])))) continue;
    const d=pr.reduce((s,p)=>s+p.depth,0)/8; if(d<bd){ bd=d; best={i,j,k,corners:cor}; }
  }
  return best;
}
function computeDrop(it,mx,my){
  if(it.role==='edge') return { t:'edge', hit:hitEdge(mx,my) };
  if(it.role==='cell') return { t:'cell', hit:hitCell(mx,my) };
  if(it.role==='base') return { t:'ball', hit:hitBall(mx,my) };
  if(it.kind==='panel') return { t:'face', hit:hitFaceAny(mx,my) };   // metal panel = any framed face (sides/back AND top/bottom)
  return { t:'face', hit:hitFace(mx,my, it.role==='v-face') };
}
function dropPart(it){
  const h = dropTarget && dropTarget.hit; if(!h) return;
  if(it.role==='edge'){ lines.push({a:h.a, b:h.b, kind:'tube', colour:null}); placeMsg=''; }
  else if(it.role==='cell'){                                                       // template: a whole bay = 12 frame tubes (+ cladding)
    const cor=h.corners, have=tubeEdges();
    for(const [u,w] of CELL_EDGES){ const a=cor[u],b=cor[w]; if(!have.has(edge3(a,b))) lines.push({a,b,kind:'tube',colour:null}); }
    if(it.clad){                                                                   // clad back + sides + top + bottom; leave the front (−Y) open
      const glass=it.clad==='glass';
      const F=[[cor[3],cor[6]],[cor[0],cor[7]],[cor[1],cor[6]],[cor[0],cor[2]],[cor[4],cor[6]]]; // back, left, right, bottom, top
      for(const [a,b] of F) lines.push({a,b, kind:glass?'glass':'panel', variant:glass?null:'metal', colour:glass?null:activeColour});
    }
    placeMsg='';
  }
  else if(it.role==='base'){ baseType=it.baseType; }                              // sets base-support type for the auto-feet
  else {                                                                           // v-face / h-face
    const kind=it.kind, A=h.a, B=h.b;
    if(!faceFramed(A,B)){ placeMsg=`no frame here — a ${kind} needs 4 tubes around this face`; return; }
    if(kind==='panel'||kind==='glass'){ const d=panelDimsMM({a:A,b:B}); if((d[0]<=175&&d[1]<=175)||(d[0]===750&&d[1]===750)){ placeMsg=`${kind} ${d[0]}×${d[1]} not a USM size`; return; } }
    { const pt=plausTypeFor(kind, it.doorType, it.variant), sr=pt&&sizeReason({a:A,b:B},pt);   // per-part allowed-size rule (source)
      if(sr){ placeMsg=`${it.name||kind} doesn’t fit this compartment — ${sr} (USM rule)`; return; } }
    const glassy = kind==='glass' || (kind==='shelf'&&it.variant==='glass');
    const el={ a:A, b:B, kind, variant:it.variant||null, colour:glassy?null:activeColour };
    if(kind==='door'){ el.doorType=it.doorType; if(it.doorType==='glass'){ el.colour=null; el.knob=it.knob||'right'; } }
    lines.push(el); placeMsg='';
  }
}
// load + show a part's real properties: placement rule + the actual .obj/.3d mesh & dimensions (from /api/mesh)
async function showProps(item){
  const panel=document.getElementById('props'); panel.classList.add('show');
  const role = item.role ? ROLE_TEXT[item.role] : 'not placeable yet (catalogue item)';
  panel.innerHTML = `<span class="close" id="propsX">×</span><h4>${item.name}</h4>`+
    `<div class="pk">placement (approx): ${role}</div>`+
    (item.mesh ? `<canvas id="pcv" width="380" height="240"></canvas><div class="pk" id="propsDims">loading mesh…</div>` : `<div class="pk">mesh: not wired</div>`)+
    `<div class="pk" id="propsRules" style="margin-top:6px"></div>`+
    ((requiredPartsFor(item)||[]).length ? `<div class="pk" style="margin-top:6px"><b>auto-added parts (source):</b><br>`+requiredPartsFor(item).map(p=>`${p.q}× ${p.n}`).join(' · ')+`</div>` : '')+
    `<div class="pk" id="propsDocks" style="margin-top:6px">snap rule …</div>`;
  document.getElementById('propsX').onclick=()=>panel.classList.remove('show');
  // allowed-parameter rules from source (volumecontentplausibility.xml size/requires + operator.xml mountingheight)
  const ptype = plausTypeFor(item.kind, item.doorType, item.variant), rd=document.getElementById('propsRules');
  if(ptype && rd){ try{
    const p = await fetch('/api/plausibility?type='+encodeURIComponent(ptype)).then(x=>x.json()); const rl=[], rng=(lo,hi)=>`${lo!=null?lo:'—'}…${hi!=null?hi:'—'}`;
    if(p.size) rl.push(`fits compartment: W ${rng(p.size.minW,p.size.maxW)} · H ${rng(p.size.minH,p.size.maxH)} · D ${rng(p.size.minD,p.size.maxD)} mm`);
    if(p.mountingheight) rl.push(`mounting height: ${p.mountingheight.min}–${p.mountingheight.max} ${p.mountingheight.unit}`);
    if(p.requires&&p.requires.length) rl.push(`needs: ${p.requires.join(', ')}`);
    if(rl.length) rd.innerHTML=`<b>allowed parameters (source):</b><br>`+rl.join('<br>');
  }catch(e){} }
  if(item.mesh){
    try{
      const m = await fetch('/api/mesh?name='+encodeURIComponent(item.mesh)).then(r=>r.json());
      const dd=document.getElementById('propsDims');
      if(dd){ if(m.error) dd.textContent=`mesh: ${m.error} (${item.mesh})`;
        else { drawMeshPreview(document.getElementById('pcv'), m); dd.innerHTML=`dims ${m.dimsMM[0]} × ${m.dimsMM[1]} × ${m.dimsMM[2]} mm<br>${m.verts} v · ${m.tris} tri<br><span style="opacity:.6">${m.source}</span>`; } }
    }catch(e){ const dd=document.getElementById('propsDims'); if(dd) dd.textContent='mesh load failed'; }
  }
  // real snap/dock rule from the decoded VCML (componentsystem + docksystem)
  const part = item.comp || item.mesh, dk=document.getElementById('propsDocks');
  if(!part){ dk.textContent=''; return; }
  try{
    const r = await fetch('/api/docks?part='+encodeURIComponent(part)).then(x=>x.json());
    if(r.error){ dk.innerHTML=`<b>snap rule (source):</b> ${r.error}`; return; }
    if(r.note && !r.dockCount){ dk.innerHTML=`<b>snap rule (${r.cartridge}):</b> ${r.note}`; return; }
    const g={}; for(const d of r.docks){ (g[d.type]=g[d.type]||{n:0,to:d.snapsTo,dof:d.dof}).n++; }
    const rows=Object.entries(g).sort((a,b)=>b[1].n-a[1].n).slice(0,6)
      .map(([t,v])=>`${t} ×${v.n} → ${v.to||'?'}${v.dof?` [${v.dof}]`:''}`);
    dk.innerHTML=`<b>snap rule (source · ${r.dockCount} docks):</b><br>`+rows.join('<br>');
  }catch(e){ dk.textContent='snap rule: load failed'; }
}
// ===== SOLVED-CONFIGURATION render — the RIGHT way: the engine solver gives every part a world transform (pos+quat,
// validated EXACT vs P'X5); we just apply the quaternion + translate. No HW_LAYOUT, no canonicalization, no x/y/z juggling. =====
let SOLVED = null;
function qrot(q,v){ const x=q[0],y=q[1],z=q[2],w=q[3], a=v[0],b=v[1],c=v[2];

  const o=v_mid(qc[0],qc[2]), e1=v_sub(qc[1],qc[0]), e2=v_sub(qc[3],qc[0]);
  const u1=v_unit(e1), u2=v_unit(e2), d1=v_len(e1), d2=v_len(e2), vert1=Math.abs(u1[2])>=Math.abs(u2[2]);
  let uV=vert1?u1:u2, dH=vert1?d1:d2; const uH=vert1?u2:u1, dW=vert1?d2:d1;
  if(uV[2]<0) uV=uV.map(x=>-x);
  return {o,uH,uV,w:v_unit(v_cross(uH,uV)),dW,dH};
}
// where each required hardware mesh snaps on a placed face — REAL dock pose (position + orientation) from source
function hardwarePlacements(ln){
  if(!isFace(ln.kind)) return [];
  const key = ln.kind==='door'?'door:'+ln.doorType : ln.kind==='glass'?'glass' : null;
  const lay=HW_LAYOUT[key]; if(!lay) return [];
  const F=faceFrame(ln), flip=(key==='door:glass'&&ln.knob==='left')?-1:1;
  const M = basisMat([F.uH, F.uV, F.w]);                              // ONE frame for every host (H=uH, V=uV, N=w) — meshes are canonicalized so no per-part axis swap
  const out=[];
  for(const h of lay){ const fH=h.fH*flip;
    const pos=[ F.o[0]+fH*(F.dW/2)*F.uH[0]+h.fV*(F.dH/2)*F.uV[0]+h.nm*F.w[0],
                F.o[1]+fH*(F.dW/2)*F.uH[1]+h.fV*(F.dH/2)*F.uV[1]+h.nm*F.w[1],
                F.o[2]+fH*(F.dW/2)*F.uH[2]+h.fV*(F.dH/2)*F.uV[2]+h.nm*F.w[2] ];
    const R = h.rot ? m3m(M, eulerMat(h.rot[0],h.rot[1],h.rot[2])) : M;                      // orient to the real dock rotation
    out.push({ n:h.n, pos, R });
  }
  return out;
}
function renderMeshes(){
  const tris=[];
  const add=(verts,T,tint,alpha,dbias)=>{ const pj=verts.map(v=>project(world(v)));
    for(let i=0;i<T.length;i+=3){ const a=pj[T[i]],b=pj[T[i+1]],c=pj[T[i+2]]; if(a&&b&&c) tris.push({a,b,c,depth:(a.depth+b.depth+c.depth)/3-(dbias||0),tint,alpha}); } };
  const ball=getMesh('Kugel');
  // balls drawn ~half-a-ball nearer (depth bias) so they always CAP the tube ends at a junction (painter's algo has no z-buffer)
  if(ball) for(const n of usedNodes()) add(instBall(ball,nodePos(...n)), ball.T, [208,213,220], 1, 14);
  for(const ln of lines){ if(!inRange(ln.a)||!inRange(ln.b)) continue;
    const m=getMesh(meshNameFor(ln)); if(!m) continue;
    if(ln.kind==='tube') add(instTube(m,nodePos(...ln.a),nodePos(...ln.b)), m.T, [178,188,202], 1);
    else if(isFace(ln.kind)){ const gl=ln.kind==='glass'||(ln.kind==='door'&&ln.doorType==='glass');
      add(instFace(m,ln), m.T, gl?[150,200,225]:rgbOf(ln.colour||'#cdccc4'), gl?0.4:1); }
  }
  // required hardware geometry — clamps (Glashalter), hinges, handles/knobs — on each placed glass/door
  for(const ln of lines){ if(!inRange(ln.a)||!inRange(ln.b)) continue;
    for(const hp of hardwarePlacements(ln)){ const hm=getMesh(hp.n); if(hm) add(instOriented(hm,hp.pos,hp.R), hm.T, [148,152,158], 1, 18); } }  // real dock pose (oriented); dbias 18 > ball's 14
  // EXTRAS: complex accessories (drawers, Inos, Kasten, rail, support, Haller-E, pot, feet/castors) rendered as real meshes at a world position
  for(const ex of EXTRAS){ const em=getMesh(ex.name); if(em) add(instBall(em, ex.pos), em.T, ex.tint||[170,174,180], ex.alpha||1, ex.dbias!=null?ex.dbias:8); }
  if(!tris.length) return;
  let dmn=Infinity, dmx=-Infinity; for(const t of tris){ if(t.depth<dmn)dmn=t.depth; if(t.depth>dmx)dmx=t.depth; }  // loop, not spread (big scenes overflow Math.min(...))
  tris.sort((u,v)=>v.depth-u.depth);
  for(const t of tris){ const f=dmx>dmn?(t.depth-dmn)/(dmx-dmn):0, sh=0.5+(1-f)*0.5, c=t.tint;
    ctx.fillStyle=`rgba(${Math.round(c[0]*sh)},${Math.round(c[1]*sh)},${Math.round(c[2]*sh)},${t.alpha})`;
    ctx.strokeStyle='rgba(18,22,28,0.28)'; ctx.lineWidth=0.4;
    ctx.beginPath();ctx.moveTo(t.a.x,t.a.y);ctx.lineTo(t.b.x,t.b.y);ctx.lineTo(t.c.x,t.c.y);ctx.closePath();ctx.fill();ctx.stroke(); }
}

// ---------- mouse: click = pick/draw, drag = orbit, wheel = zoom ----------
let drag=null, moved=false;
const rel = e => { const r=cv.getBoundingClientRect(); return [e.clientX-r.left, e.clientY-r.top]; };
cv.addEventListener('mousedown',e=>{ drag={x0:e.clientX,y0:e.clientY,x:e.clientX,y:e.clientY}; moved=false; });
addEventListener('mousemove',e=>{
  if(dragItem){                                            // dragging a catalog part → live drop-target highlight
    moveGhost(e); const r=cv.getBoundingClientRect();
    dropTarget = (e.clientX>=r.left&&e.clientX<=r.right&&e.clientY>=r.top&&e.clientY<=r.bottom)
      ? computeDrop(dragItem, e.clientX-r.left, e.clientY-r.top) : null;
    draw(); return;
  }
  const [mx,my]=rel(e);
  if(drag){
    if(!moved && Math.hypot(e.clientX-drag.x0, e.clientY-drag.y0)>4) moved=true;
    if(moved){
      cam.yaw += (e.clientX-drag.x)*0.008;
      cam.pitch = Math.max(-1.5, Math.min(1.5, cam.pitch+(e.clientY-drag.y)*0.008));
      hover=null; draw();
    }
    drag.x=e.clientX; drag.y=e.clientY;
  } else {
    const h=pick(mx,my); cv.style.cursor = h>=0?'pointer':'default';
    if(h!==hover){ hover=h; draw(); }
  }
});
addEventListener('mouseup',e=>{
  if(dragItem){                                            // drop the catalog part, OR (no drag) show its properties
    const r=cv.getBoundingClientRect();
    const overCanvas = e.clientX>=r.left&&e.clientX<=r.right&&e.clientY>=r.top&&e.clientY<=r.bottom;
    if(overCanvas && dropTarget && dropTarget.hit) dropPart(dragItem);
    else if(Math.hypot(e.clientX-dragStart.x, e.clientY-dragStart.y) < 5) showProps(dragItem);   // a click → properties
    endDrag(); draw(); return;
  }
  if(drag && !moved){ const [mx,my]=rel(e); clickDot(pick(mx,my)); }
  drag=null;
});
cv.addEventListener('wheel',e=>{ e.preventDefault(); cam.dist*=e.deltaY>0?1.1:0.9; draw(); },{passive:false});
addEventListener('resize',()=>{ fit(); draw(); });
init();
</script></body></html>
