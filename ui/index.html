<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>USM Rule Editor</title>
<style>
  :root {
    --bg:#0f1115; --panel:#171a21; --panel2:#1d212b; --line:#2a2f3a; --ink:#e7ebf2; --dim:#8a93a6;
    --acc:#5b9dff; --acc2:#7ee0a0; --warn:#ffcf6b; --bad:#ff7a85; --edit:#c08bff; --mono:ui-monospace,"Cascadia Code",Consolas,monospace;
  }
  * { box-sizing:border-box; }
  body { margin:0; font:14px/1.45 system-ui,Segoe UI,sans-serif; background:var(--bg); color:var(--ink); height:100vh; display:flex; flex-direction:column; }
  header { display:flex; align-items:center; gap:12px; padding:10px 16px; background:var(--panel); border-bottom:1px solid var(--line); }
  header h1 { font-size:15px; margin:0; font-weight:600; letter-spacing:.2px; }
  header .sub { color:var(--dim); font-size:12px; }
  header .spacer { flex:1; }
  .badge { font-size:11px; padding:2px 8px; border-radius:99px; background:var(--panel2); border:1px solid var(--line); color:var(--dim); }
  .badge.on { color:var(--edit); border-color:var(--edit); }
  button { font:inherit; background:var(--panel2); color:var(--ink); border:1px solid var(--line); border-radius:7px; padding:6px 12px; cursor:pointer; }
  button:hover { border-color:var(--acc); }
  button.primary { background:var(--acc); color:#06101f; border-color:var(--acc); font-weight:600; }
  button.ghost { background:transparent; }
  main { flex:1; display:grid; grid-template-columns:300px 1fr; min-height:0; }
  .side { border-right:1px solid var(--line); display:flex; flex-direction:column; min-height:0; background:var(--panel); }
  .tabs { display:flex; flex-wrap:wrap; gap:4px; padding:10px; border-bottom:1px solid var(--line); }
  .tab { font-size:12px; padding:5px 9px; border-radius:6px; cursor:pointer; color:var(--dim); border:1px solid transparent; }
  .tab.active { color:var(--ink); background:var(--panel2); border-color:var(--line); }
  .tab b { color:var(--acc); font-weight:600; }
  .search { padding:10px; border-bottom:1px solid var(--line); }
  .search input { width:100%; padding:7px 10px; background:var(--bg); border:1px solid var(--line); border-radius:6px; color:var(--ink); font:inherit; }
  .list { overflow:auto; flex:1; }
  .row { padding:7px 12px; border-bottom:1px solid #20242e; cursor:pointer; font-size:13px; display:flex; gap:8px; align-items:center; }
  .row:hover { background:var(--panel2); }
  .row.sel { background:#222a3a; box-shadow:inset 3px 0 0 var(--acc); }
  .row .nm { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; }
  .row .t { font-size:10px; color:var(--dim); }
  .dot { width:6px; height:6px; border-radius:99px; background:var(--edit); flex:none; }
  .detail { overflow:auto; padding:20px 24px; }
  .detail h2 { margin:0 0 2px; font-size:18px; font-family:var(--mono); }
  .meta { color:var(--dim); font-size:12px; margin-bottom:16px; }
  .field { margin-bottom:16px; }
  .field label { display:block; font-size:11px; text-transform:uppercase; letter-spacing:.6px; color:var(--dim); margin-bottom:5px; }
  textarea { width:100%; min-height:120px; background:var(--panel); border:1px solid var(--line); border-radius:8px; color:var(--ink); font:13px/1.5 var(--mono); padding:10px; resize:vertical; }
  .chips { display:flex; flex-wrap:wrap; gap:5px; }
  .chip { font-size:11px; padding:2px 8px; border-radius:99px; background:var(--panel2); border:1px solid var(--line); color:var(--dim); font-family:var(--mono); }
  .dom { display:flex; flex-wrap:wrap; gap:6px; }
  .dom input { background:var(--panel); border:1px solid var(--line); border-radius:6px; color:var(--ink); padding:4px 8px; font:12px var(--mono); width:auto; }
  .actions { display:flex; gap:8px; margin-top:8px; }
  .empty { color:var(--dim); padding:48px; text-align:center; }
  /* clause tree */
  .tree { font-family:var(--mono); font-size:13px; }
  .node { margin:2px 0 2px 0; padding-left:14px; border-left:1px solid var(--line); }
  .node > .h { padding:1px 0; }
  .tag { color:var(--acc); } .tag.part { color:var(--acc2); } .tag.clause { color:var(--warn); } .tag.not { color:var(--bad); }
  .at { color:var(--dim); } .av { color:var(--ink); }
  /* run drawer */
  .drawer { position:fixed; inset:0; background:rgba(0,0,0,.55); display:none; align-items:center; justify-content:center; }
  .drawer.show { display:flex; }
  .card { width:min(900px,92vw); max-height:86vh; background:var(--panel); border:1px solid var(--line); border-radius:12px; display:flex; flex-direction:column; }
  .card .top { display:flex; align-items:center; gap:10px; padding:12px 16px; border-bottom:1px solid var(--line); }
  .card pre { margin:0; padding:16px; overflow:auto; font:12.5px/1.5 var(--mono); color:#cfe6cf; white-space:pre-wrap; }
  .ok { color:var(--acc2); } .err { color:var(--bad); }
  .toast { position:fixed; bottom:18px; left:50%; transform:translateX(-50%); background:var(--acc2); color:#06140a; padding:8px 16px; border-radius:8px; font-weight:600; opacity:0; transition:opacity .2s; pointer-events:none; }
  .toast.show { opacity:1; }
  /* 3D pick panel */
  #pick3d { position:absolute; top:54px; right:14px; width:290px; max-height:calc(88vh - 90px); overflow:auto; background:rgba(23,26,33,.96); border:1px solid var(--line); border-radius:10px; padding:12px 14px; display:none; }
  #pick3d.show { display:block; }
  #pick3d h3 { margin:0 0 2px; font:600 14px var(--mono); color:var(--acc2); word-break:break-all; }
  #pick3d .pmeta { color:var(--dim); font-size:11px; margin-bottom:10px; }
  #pick3d .sec { font-size:10px; text-transform:uppercase; letter-spacing:.6px; color:var(--dim); margin:10px 0 4px; }
  #pick3d .rule { padding:4px 8px; border:1px solid var(--line); border-radius:6px; margin:3px 0; cursor:pointer; font:12px var(--mono); display:flex; gap:6px; align-items:center; }
  #pick3d .rule:hover { border-color:var(--acc); background:var(--panel2); }
  #pick3d .rule .k { font-size:9px; color:var(--dim); }
  #pick3d .none { color:var(--dim); font-size:12px; }
</style>
</head>
<body>
<header>
  <h1>USM Rule Editor</h1>
  <span class="sub" id="modelMeta">loading…</span>
  <span class="spacer"></span>
  <span class="badge" id="ovBadge">no edits</span>
  <button class="ghost" id="resetBtn">Reset edits</button>
  <button id="view3dBtn">3D View</button>
  <button id="solveBtn">Solve placement</button>
  <button id="conflictsBtn">Check conflicts</button>
  <button class="primary" id="validateBtn">Validate vs P'X5</button>
</header>
<main>
  <div class="side">
    <div class="tabs" id="tabs"></div>
    <div class="search"><input id="q" placeholder="Search…" autocomplete="off" /></div>
    <div class="list" id="list"></div>
  </div>
  <div class="detail" id="detail"><div class="empty">Select an item.</div></div>
</main>

<div class="drawer" id="drawer">
  <div class="card">
    <div class="top"><b id="runTitle">Run</b><span class="spacer" style="flex:1"></span><span id="runStatus" class="sub"></span><button class="ghost" onclick="document.getElementById('drawer').classList.remove('show')">Close</button></div>
    <pre id="runOut">…</pre>
  </div>
</div>
<div class="drawer" id="view3d">
  <div class="card" style="width:min(1100px,96vw);height:88vh;position:relative">
    <div class="top">
      <b>3D View — engine-solved placement</b>
      <span class="sub" id="viewInfo"></span>
      <span class="spacer" style="flex:1"></span>
      <label class="sub"><input type="checkbox" id="optGlass" checked/> panels</label>
      <label class="sub"><input type="checkbox" id="optTriad" checked/> fitting orientation</label>
      <label class="sub"><input type="checkbox" id="optLabels"/> labels</label>
      <button class="ghost" onclick="document.getElementById('view3d').classList.remove('show')">Close</button>
    </div>
    <canvas id="cv" style="flex:1;width:100%;display:block;cursor:grab;background:#0b0d12"></canvas>
    <div id="pick3d"></div>
    <div class="sub" style="padding:6px 14px;border-top:1px solid var(--line)">drag = orbit · wheel = zoom · click a part for its rules · <span style="color:#8a93a6">■</span> structure <span style="color:#7a5a3a">■</span> feet <span style="color:#4fd0e0">■</span> glass <span style="color:#ffb454">■</span> fittings (L/R orientation shown) <span style="color:#ffd166">■</span> drawers/doors</div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const $ = (s) => document.querySelector(s);
let MODEL = null, TAB = "clauses", SEL = null;
const TABS = [["clauses","Clauses"],["properties","Properties"],["assemblyRules","Assembly"],["components","Components"]];
const keyOf = (it) => it.type; // clauses/properties/components/assemblyRules are all keyed by .type

async function load() {
  MODEL = await (await fetch("/api/model")).json();
  $("#modelMeta").textContent = `Haller · ${MODEL.components.length} parts · ${MODEL.properties.length} props · ${MODEL.clauses.length} clauses · ${MODEL.assemblyRules.length} rules`;
  renderTabs(); renderOverlay(); renderList();
}
function renderOverlay() {
  const n = (MODEL._overlay?.properties || 0) + (MODEL._overlay?.clauses || 0);
  const b = $("#ovBadge"); b.textContent = n ? `${n} edit${n>1?"s":""}` : "no edits"; b.classList.toggle("on", n>0);
}
function renderTabs() {
  $("#tabs").innerHTML = TABS.map(([k,lbl]) => `<div class="tab ${k===TAB?"active":""}" data-k="${k}">${lbl} <b>${MODEL[k].length}</b></div>`).join("");
  $("#tabs").querySelectorAll(".tab").forEach(t => t.onclick = () => { TAB=t.dataset.k; SEL=null; renderTabs(); renderList(); $("#detail").innerHTML='<div class="empty">Select an item.</div>'; });
}
function renderList() {
  const q = $("#q").value.trim().toLowerCase();
  let items = MODEL[TAB];
  if (q) items = items.filter(it => JSON.stringify(it).toLowerCase().includes(q));
  const sub = TAB==="properties" ? (it)=>it.feature : TAB==="components" ? (it)=>it.supertype||"" : "";
  $("#list").innerHTML = items.slice(0,800).map(it => {
    const k = keyOf(it);
    return `<div class="row ${k===SEL?"sel":""}" data-k="${esc(k)}">${it._edited?'<span class="dot"></span>':""}<span class="nm">${esc(k)}</span><span class="t">${esc(typeof sub==="function"?sub(it):"")}</span></div>`;
  }).join("") + (items.length>800?`<div class="empty">… ${items.length-800} more (refine search)</div>`:"");
  $("#list").querySelectorAll(".row").forEach(r => r.onclick = () => { SEL=r.dataset.k; renderList(); renderDetail(); });
}
$("#q").oninput = renderList;

function find(k){ return MODEL[TAB].find(it => keyOf(it)===k); }
function renderDetail() {
  const it = find(SEL); if (!it) return;
  if (TAB==="properties") return detailProperty(it);
  if (TAB==="clauses") return detailClause(it);
  if (TAB==="assemblyRules") return detailAssembly(it);
  return detailComponent(it);
}

function detailProperty(p) {
  const dom = p.domain && p.domain.kind==="discrete" ? p.domain.values : null;
  $("#detail").innerHTML = `
    <h2>${esc(p.type)} ${p._edited?'<span class="badge on">edited</span>':""}</h2>
    <div class="meta">feature <b>${esc(p.feature)}</b> · ${p.evalOnAccess?"evalOnAccess":"eager"} · ${p.overwritable?"overwritable":"locked"}</div>
    <div class="field"><label>Applies to (${p.assignedTo.length})</label><div class="chips">${p.assignedTo.map(t=>`<span class="chip">${esc(t)}</span>`).join("")||'<span class="chip">—</span>'}</div></div>
    <div class="field"><label>Default expression (VCML)</label><textarea id="expr">${esc(p.defaultExpr??"")}</textarea></div>
    ${dom?`<div class="field"><label>Domain values (discrete)</label><div class="dom" id="dom">${dom.map(v=>`<input value="${esc(v)}"/>`).join("")}<button class="ghost" id="addDom">+</button></div></div>`:""}
    <div class="actions"><button class="primary" id="save">Save edit</button><button class="ghost" id="revert">Revert to source</button><button class="ghost" id="show3d">Show in 3D</button></div>`;
  if (dom) $("#addDom").onclick = () => { const i=document.createElement("input"); i.value=""; $("#dom").insertBefore(i,$("#addDom")); i.focus(); };
  $("#save").onclick = () => {
    const patch = { defaultExpr: $("#expr").value };
    if (dom) patch.domain = { kind:"discrete", values:[...$("#dom").querySelectorAll("input")].map(i=>i.value.trim()).filter(Boolean) };
    override("property", p.type, patch);
  };
  $("#revert").onclick = () => override("property", p.type, null);
  $("#show3d").onclick = () => { hiTypes = (p.assignedTo || []).slice(); picked = null; $("#pick3d").classList.remove("show"); openView(); };
}

function detailClause(c) {
  $("#detail").innerHTML = `
    <h2>${esc(c.type)} ${c._edited?'<span class="badge on">edited</span>':""}</h2>
    <div class="meta">constraint clause · condition tree below</div>
    <div class="field"><label><input type="checkbox" id="dis" ${c.disabled?"checked":""}/> Disable this clause (overlay)</label></div>
    <div class="field"><label>Condition</label><div class="tree">${renderTree(c.condition)}</div></div>
    <div class="actions"><button class="primary" id="save">Save edit</button><button class="ghost" id="revert">Revert to source</button><button class="ghost" id="show3d">Show in 3D</button></div>`;
  $("#save").onclick = () => override("clause", c.type, $("#dis").checked ? { disabled:true } : null);
  $("#revert").onclick = () => override("clause", c.type, null);
  $("#show3d").onclick = () => { const s=new Set(); typesInTree(c.condition,s); hiTypes=[...s]; picked=null; $("#pick3d").classList.remove("show"); openView(); };
}
function renderTree(n) {
  if (!n) return '<span class="at">(none)</span>';
  const cls = n.tag==="part"?"part":n.tag==="clause"?"clause":n.tag==="not"?"not":"";
  const attrs = Object.entries(n.attrs||{}).map(([k,v])=>` <span class="at">${esc(k)}=</span><span class="av">${esc(v)}</span>`).join("");
  const kids = (n.children||[]).map(renderTree).join("");
  return `<div class="node"><div class="h"><span class="tag ${cls}">${esc(n.tag)}</span>${attrs}</div>${kids}</div>`;
}

function detailAssembly(a) {
  $("#detail").innerHTML = `<h2>${esc(a.type)}</h2><div class="meta">assembly rule · ${(a.morphologies||[]).length} morpholog(ies)</div>
    <div class="field"><label>Definition</label><textarea readonly style="min-height:260px">${esc(JSON.stringify(a.morphologies,null,2))}</textarea></div>`;
}
function detailComponent(c) {
  $("#detail").innerHTML = `<h2>${esc(c.type)}</h2><div class="meta">component · supertype <b>${esc(c.supertype||"—")}</b> · ${(c.docks||[]).length} dock(s)</div>
    <div class="field"><label>Docks</label><div class="chips">${(c.docks||[]).map(d=>`<span class="chip">${esc(typeof d==="string"?d:d.id||d.type||JSON.stringify(d))}</span>`).join("")||'<span class="chip">—</span>'}</div></div>`;
}

async function override(kind, key, patch) {
  const r = await (await fetch("/api/override",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({kind,key,patch})})).json();
  if (r.error) return toast("Error: "+r.error);
  toast(patch?"Saved":"Reverted");
  await load();
  TAB = kind==="property"?"properties":"clauses"; SEL = key; renderTabs(); renderList(); renderDetail();
}
$("#resetBtn").onclick = async () => { await fetch("/api/reset",{method:"POST"}); toast("All edits cleared"); await load(); $("#detail").innerHTML='<div class="empty">Select an item.</div>'; };

async function run(script, title) {
  $("#runTitle").textContent = title; $("#runStatus").textContent = "running…"; $("#runOut").textContent = "…";
  $("#drawer").classList.add("show");
  try {
    const r = await (await fetch("/api/run",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({script})})).json();
    $("#runStatus").innerHTML = r.ok?'<span class="ok">exit 0</span>':'<span class="err">non-zero exit</span>';
    $("#runOut").textContent = r.stdout || r.error || "(no output)";
  } catch(e){ $("#runStatus").innerHTML='<span class="err">failed</span>'; $("#runOut").textContent=String(e); }
}
$("#validateBtn").onclick = () => run("validate","Validate features vs P'X5");
$("#conflictsBtn").onclick = () => run("conflicts","Check conflicts vs P'X5");
$("#solveBtn").onclick = () => run("solve","Solve placement vs P'X5");

// ---------- 3D viewport (pure canvas, no deps) ----------
const cv = $("#cv"), ctx = cv.getContext("2d");
let PLACE = null, cam = { yaw:-0.7, pitch:0.35, dist:400, cx:0, cy:0, cz:0, f:1 };
let picked = null, hiTypes = null, screenParts = [], hoverId = null;
const famColor = (t) => /^kugel/.test(t)?"#8a93a6": /^rohr/.test(t)?"#6b7280": /^(blech|tablar|boden|abdeck|rueckwand|quertraverse)/.test(t)?"#aab0bd": /^(hallerfuss|fuss)/.test(t)?"#7a5a3a": /glas/.test(t)?"#4fd0e0": /(scharnier|halter)/.test(t)?"#ffb454": /(teleskop|auszug|tuer|schublade|winkel|klemm|griff|schloss|scheren)/.test(t)?"#ffd166":"#9aa3b2";
const isFitting = (t)=>/scharnier|halter/.test(t);
function qrot(q,v){ const [x,y,z,w]=q,[a,b,c]=v; const tx=2*(y*c-z*b),ty=2*(z*a-x*c),tz=2*(x*b-y*a); return [a+w*tx+(y*tz-z*ty), b+w*ty+(z*tx-x*tz), c+w*tz+(x*ty-y*tx)]; }
function project(p){
  let x=p[0]-cam.cx, y=p[1]-cam.cy, z=p[2]-cam.cz;
  const cy=Math.cos(cam.yaw),sy=Math.sin(cam.yaw); const x1=x*cy-y*sy, y1=x*sy+y*cy;
  const cp=Math.cos(cam.pitch),sp=Math.sin(cam.pitch); const y2=y1*cp-z*sp, z2=y1*sp+z*cp;
  const depth=y2+cam.dist; if(depth<=1) return null;
  return { x: cv.width/2 + x1*cam.f/depth, y: cv.height/2 - z2*cam.f/depth, depth };
}
function fit(){
  const mn=[1e9,1e9,1e9],mx=[-1e9,-1e9,-1e9];
  for(const p of PLACE.parts) for(let i=0;i<3;i++){ mn[i]=Math.min(mn[i],p.pos[i]); mx[i]=Math.max(mx[i],p.pos[i]); }
  cam.cx=(mn[0]+mx[0])/2; cam.cy=(mn[1]+mx[1])/2; cam.cz=(mn[2]+mx[2])/2;
  const ext=Math.max(mx[0]-mn[0],mx[1]-mn[1],mx[2]-mn[2],20);
  // near-orthographic: large dist so depth-variation is small (parallel lines stay parallel),
  // f scaled so the structure fills ~70% of the viewport. Avoids the wide-FOV "taper to a point".
  cam.dist=ext*5; cam.f=Math.min(cv.width,cv.height)*0.7*cam.dist/ext;
  cam.yaw=-0.6; cam.pitch=0.42;
}
function draw(){
  if(!PLACE) return;
  cv.width=cv.clientWidth; cv.height=cv.clientHeight; ctx.clearRect(0,0,cv.width,cv.height);
  const byId=new Map(PLACE.parts.map(p=>[p.id,p])); const prims=[]; screenParts=[];
  for(const [a,b] of (PLACE.connections||[])){ const pa=byId.get(a),pb=byId.get(b); if(!pa||!pb)continue; const A=project(pa.pos),B=project(pb.pos); if(A&&B) prims.push({depth:(A.depth+B.depth)/2,kind:"line",A,B}); }
  for(const p of PLACE.parts){
    const P=project(p.pos); if(!P)continue;
    if($("#optGlass").checked && p.quad){ // real world-space corners emitted by the solver
      const C=p.quad.map(c=>project(c));
      if(C.every(Boolean)) prims.push({depth:P.depth,kind:"quad",C,glass:p.panelKind==="glass"});
    }
    screenParts.push({id:p.id,sx:P.x,sy:P.y,type:p.type});
    prims.push({depth:P.depth,kind:"dot",P,color:famColor(p.type),r:/^kugel/.test(p.type)?3.2:isFitting(p.type)?2.6:2,type:p.type,id:p.id});
    if($("#optTriad").checked && isFitting(p.type))
      for(const [ax,col] of [[[0,0,5],"#ff5d6c"],[[5,0,0],"#7ee0a0"]]){ const r=qrot(p.quat,ax); const E=project([p.pos[0]+r[0],p.pos[1]+r[1],p.pos[2]+r[2]]); if(E) prims.push({depth:P.depth-0.01,kind:"line",A:P,B:E,color:col,w:1.8}); }
  }
  prims.sort((a,b)=>b.depth-a.depth);
  for(const o of prims){
    if(o.kind==="line"){ ctx.strokeStyle=o.color||"rgba(120,130,150,0.28)"; ctx.lineWidth=o.w||1; ctx.beginPath(); ctx.moveTo(o.A.x,o.A.y); ctx.lineTo(o.B.x,o.B.y); ctx.stroke(); }
    else if(o.kind==="quad"){ ctx.fillStyle=o.glass?"rgba(79,208,224,0.16)":"rgba(150,160,175,0.13)"; ctx.strokeStyle=o.glass?"rgba(79,208,224,0.75)":"rgba(150,160,175,0.5)"; ctx.beginPath(); ctx.moveTo(o.C[0].x,o.C[0].y); for(let i=1;i<4;i++)ctx.lineTo(o.C[i].x,o.C[i].y); ctx.closePath(); ctx.fill(); ctx.stroke(); }
    else { const hi=isHi(o.type), sel=o.id===picked; ctx.fillStyle=o.color; ctx.beginPath(); ctx.arc(o.P.x,o.P.y,sel?o.r+2:o.r,0,7); ctx.fill();
      if(sel){ ctx.strokeStyle="#fff"; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(o.P.x,o.P.y,o.r+5,0,7); ctx.stroke(); }
      else if(hi){ ctx.strokeStyle="#ffd166"; ctx.lineWidth=1.5; ctx.beginPath(); ctx.arc(o.P.x,o.P.y,o.r+4,0,7); ctx.stroke(); } }
  }
  // ---- label pass (on top), collision-avoided so they never pile up ----
  const lrects=[];
  function label(sx,sy,txt,opt){
    opt=opt||{}; ctx.font=(opt.bold?"bold ":"")+"10px monospace";
    const w=ctx.measureText(txt).width+8, h=15, rx=sx+7, ry=sy-8;
    if(!opt.force) for(const r of lrects) if(rx<r[0]+r[2]&&rx+w>r[0]&&ry<r[1]+r[3]&&ry+h>r[1]) return;
    lrects.push([rx,ry,w,h]);
    ctx.fillStyle="rgba(13,15,20,0.85)"; ctx.fillRect(rx,ry,w,h);
    ctx.fillStyle=opt.color||"#cfd6e2"; ctx.fillText(txt,rx+4,ry+11);
  }
  const find=(id)=>screenParts.find(s=>s.id===id);
  if(picked){ const s=find(picked); if(s) label(s.sx,s.sy,s.type+" #"+picked,{force:true,color:"#fff",bold:true}); }
  if(hoverId&&hoverId!==picked){ const s=find(hoverId); if(s) label(s.sx,s.sy,s.type,{force:true,color:"#7ee0a0"}); }
  if($("#optLabels").checked){ const skip=/^(kugel_std|rohr|kugel)/; for(const s of screenParts){ if(s.id===picked||s.id===hoverId||skip.test(s.type)) continue; label(s.sx,s.sy,s.type); } }
}
let drag=null, downAt=null, moved=false;
cv.addEventListener("mousedown",e=>{drag={x:e.clientX,y:e.clientY}; downAt={x:e.clientX,y:e.clientY}; moved=false; cv.style.cursor="grabbing";});
addEventListener("mouseup",e=>{ if(downAt && !moved) pick(e); drag=null; downAt=null; cv.style.cursor="grab"; });
addEventListener("mousemove",e=>{
  if(drag){ if(Math.abs(e.clientX-downAt.x)+Math.abs(e.clientY-downAt.y)>4) moved=true; cam.yaw+=(e.clientX-drag.x)*0.008; cam.pitch=Math.max(-1.5,Math.min(1.5,cam.pitch+(e.clientY-drag.y)*0.008)); drag={x:e.clientX,y:e.clientY}; draw(); return; }
  if(!$("#view3d").classList.contains("show")) return; // hover-to-label
  const r=cv.getBoundingClientRect(), mx=e.clientX-r.left, my=e.clientY-r.top;
  let best=null,bd=10; for(const s of screenParts){ const d=Math.hypot(s.sx-mx,s.sy-my); if(d<bd){bd=d;best=s;} }
  const id=best?best.id:null; if(id!==hoverId){ hoverId=id; cv.style.cursor=id?"pointer":"grab"; draw(); }
});
cv.addEventListener("wheel",e=>{e.preventDefault(); cam.dist*=e.deltaY>0?1.1:0.9; draw();},{passive:false});
for(const id of ["optGlass","optTriad","optLabels"]) $("#"+id).onchange=draw;

// ---- type -> rules graph (client-side, from MODEL) ----
let superMap=null;
function ensureGraph(){ if(superMap)return; superMap=new Map(); for(const c of MODEL.components) superMap.set(c.type, c.supertype||null); }
function isSubType(t,of){ ensureGraph(); let cur=t,n=0; while(cur && n++<60){ if(cur===of)return true; cur=superMap.get(cur); } return false; }
const propsForType=(type)=>MODEL.properties.filter(p=>(p.assignedTo||[]).some(a=>a===type||isSubType(type,a)));
function typesInTree(n,set){ if(!n)return; if(n.attrs&&n.attrs.type)set.add(n.attrs.type); for(const k of (n.children||[]))typesInTree(k,set); }
const clausesForType=(type)=>MODEL.clauses.filter(c=>{const s=new Set();typesInTree(c.condition,s);for(const x of s)if(type===x||isSubType(type,x))return true;return false;});
const isHi=(t)=> !!hiTypes && hiTypes.some(h=>t===h||isSubType(t,h));

function pick(e){
  const r=cv.getBoundingClientRect(), mx=e.clientX-r.left, my=e.clientY-r.top;
  let best=null,bd=12; for(const s of screenParts){ const d=Math.hypot(s.sx-mx,s.sy-my); if(d<bd){bd=d;best=s;} }
  if(!best){ picked=null; $("#pick3d").classList.remove("show"); draw(); return; }
  showPick(PLACE.parts.find(p=>p.id===best.id));
}
function showPick(part){
  picked=part.id; hiTypes=null;
  const props=propsForType(part.type), clauses=clausesForType(part.type);
  const rule=(tab,key,k,extra)=>`<div class="rule" data-tab="${tab}" data-key="${esc(key)}"><span class="k">${k}</span> ${esc(key)}${extra||""}</div>`;
  $("#pick3d").innerHTML = `<h3>${esc(part.type)}</h3><div class="pmeta">#${esc(part.id)} · pos [${part.pos.map(x=>x.toFixed(1))}]<br>quat [${part.quat.map(x=>x.toFixed(3))}]</div>`
    + `<div class="sec">Properties (${props.length})</div>` + (props.length?props.map(p=>rule("properties",p.type,"prop",` <span class="k">→ ${esc(p.feature)}</span>`)).join(""):`<div class="none">none</div>`)
    + `<div class="sec">Clauses (${clauses.length})</div>` + (clauses.length?clauses.map(c=>rule("clauses",c.type,"clause")).join(""):`<div class="none">none</div>`);
  $("#pick3d").classList.add("show");
  $("#pick3d").querySelectorAll(".rule").forEach(r=>r.onclick=()=>jumpToRule(r.dataset.tab,r.dataset.key));
  draw();
}
function jumpToRule(tab,key){
  $("#view3d").classList.remove("show");
  TAB=tab; SEL=key; renderTabs(); renderList(); renderDetail();
  const row=[...$("#list").querySelectorAll(".row")].find(x=>x.dataset.k===key); if(row) row.scrollIntoView({block:"center"});
}
async function openView(){
  $("#view3d").classList.add("show"); $("#viewInfo").textContent="solving…";
  try{ PLACE=await (await fetch("/api/placement")).json();
    $("#viewInfo").textContent = PLACE.parts.length ? `${PLACE.parts.length} parts · ${PLACE.connections.length} connections` : (PLACE.error||"no placement");
    requestAnimationFrame(()=>{ cv.width=cv.clientWidth; cv.height=cv.clientHeight; fit(); draw(); });
  }catch(e){ $("#viewInfo").textContent="failed: "+e; }
}
$("#view3dBtn").onclick=()=>{ picked=null; hiTypes=null; $("#pick3d").classList.remove("show"); openView(); };

function esc(s){ return String(s??"").replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m])); }
let toastT; function toast(m){ const t=$("#toast"); t.textContent=m; t.classList.add("show"); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("show"),1600); }

load();
</script>
