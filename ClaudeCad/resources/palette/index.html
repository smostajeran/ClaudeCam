<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ClaudeCad</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <header class="header">
        <span class="logo">ClaudeCad</span>
        <span id="version" class="version"></span>
        <span id="status" class="status"></span>
        <button id="settingsBtn" type="button" class="icon-btn" title="Settings" aria-label="Settings">&#9881;</button>
    </header>

    <section id="settings" class="settings hidden">
        <h2>Settings</h2>
        <label for="apiKey">Anthropic API key</label>
        <input id="apiKey" type="password" placeholder="sk-ant-..." autocomplete="off" spellcheck="false" />
        <p id="keyHint" class="hint">Stored locally in <code>~/.claudecad/config.json</code> (owner-readable only).</p>
        <div class="settings-actions">
            <button id="saveKeyBtn" type="button" class="quick approve">Save</button>
            <button id="closeSettingsBtn" type="button" class="quick">Close</button>
        </div>
        <hr class="settings-sep" />
        <label for="ghToken">GitHub token <span class="hint">(only if updating from a private repo)</span></label>
        <input id="ghToken" type="password" placeholder="github_pat_… / ghp_…" autocomplete="off" spellcheck="false" />
        <div class="settings-actions">
            <button id="saveTokenBtn" type="button" class="quick approve">Save token</button>
        </div>

        <hr class="settings-sep" />
        <p class="hint">ClaudeCad <span id="versionSettings">—</span></p>
        <div class="settings-actions">
            <button id="updateBtn" type="button" class="quick">Check for updates</button>
        </div>
    </section>

    <div class="chatbar">
        <select id="chatSelect" class="chat-select" title="Switch chat" aria-label="Switch chat"></select>
        <button id="newChatBtn" type="button" class="icon-btn" title="New chat" aria-label="New chat">+ New</button>
    </div>

    <main id="messages" class="messages" aria-live="polite"></main>

    <div id="working" class="working hidden">
        <span class="dots"><span></span><span></span><span></span></span>
        <span id="workingText" class="working-text">Working…</span>
    </div>

    <div id="approval" class="approval hidden">
        <span class="approval-label">This plan needs your OK:</span>
        <div class="approval-actions">
            <button id="approvePlanBtn" type="button" class="quick approve">Approve</button>
            <button id="rejectPlanBtn" type="button" class="quick discard">Reject</button>
        </div>
    </div>

    <div class="quick-actions">
        <button id="approveBtn" type="button" class="quick approve">Approve design</button>
        <button id="discardBtn" type="button" class="quick discard">Discard &amp; start over</button>
    </div>

    <div id="attachment" class="attachment hidden">
        <span class="attach-name">🖼 <span id="attachName">image</span></span>
        <button id="removeImageBtn" type="button" class="icon-btn" title="Remove image" aria-label="Remove image">✕</button>
    </div>

    <form id="composer" class="composer">
        <button id="attachBtn" type="button" class="attach-btn" title="Attach an image to build from" aria-label="Attach image">📎</button>
        <input id="imageInput" type="file" accept="image/*" hidden />
        <textarea id="input" rows="2" placeholder="Describe the part, or attach an image to build from…"></textarea>
        <button id="sendBtn" type="submit" class="send">Send</button>
    </form>

    <script src="main.js"></script>
</body>
</html>
